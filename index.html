            window.beginTests = async function(e) {
                e.preventDefault();
                const checkboxes = document.querySelectorAll('#session-form input[type="checkbox"]:checked');
                const items = Array.from(checkboxes).map(cb => ({ id: parseInt(cb.value), name: cb.dataset.name }));
                if (items.length === 0) { alert('Select at least one item!', 'w'); return; }
                const intakeSelect = document.getElementById('intake-time');
                let timeSince = intakeSelect?.value || 'immediate';
                if (timeSince === 'custom') timeSince = document.getElementById('custom-intake-time')?.value || 'custom';
                const notes = document.getElementById('session-notes')?.value || '';
                state.sessionMeta = { items, timeSince, notes, tags: [...state.sessionTags], date: new Date().toISOString() };
                hideModal();
                $('#test-overlay').classList.add('on');
                await runReactionTest();
                await runMemoryTest();
                await runNumberTest();
                await runFocusTest();
                await saveSession();
                showResults();
            };

            function runReactionTest() {
                return new Promise(resolve => {
                    $('#test-phase').textContent = 'Test 1/4: Reaction Time';
                    const trials = []; let count = 0; const total = 5; let phase = 'wait'; let start;
                    $('#test-area').innerHTML = `
                        <p style="color:var(--text2);margin-bottom:0.4rem;font-size:0.8rem;">Click when screen turns white</p>
                        <div class="react-area" id="react-box">Wait for white...</div>
                        <p style="color:var(--text2);margin-top:0.4rem;font-size:0.7rem;">Trial: <span id="trial-num">1</span>/${total}</p>
                        <div class="prog"><div class="prog-fill" style="width:0%"></div></div>`;
                    const box = $('#react-box');
                    function startTrial() {
                        box.className = 'react-area';
                        box.textContent = 'Wait for white...';
                        const delay = 800 + Math.random() * 2000;
                        setTimeout(() => {
                            if (phase !== 'testing') return;
                            box.classList.add('go');
                            box.textContent = 'NOW!';
                            start = Date.now();
                        }, delay);
                    }
                    box.addEventListener('click', () => {
                        if (phase !== 'testing') return;
                        if (box.classList.contains('go')) {
                            const rt = Date.now() - start;
                            trials.push(rt); count++;
                            box.className = 'react-area';
                            box.style.background = 'var(--grey)';
                            box.style.borderColor = 'var(--text2)';
                            box.textContent = `${rt}ms`;
                            $('#trial-num').textContent = count;
                            $('.prog-fill').style.width = `${(count/total)*100}%`;
                            if (count >= total) {
                                state.testResults.reaction = { avg: Math.round(trials.reduce((a,b)=>a+b,0)/trials.length), best: Math.min(...trials), consistency: Math.round((1 - (Math.max(...trials)-Math.min(...trials))/(trials.reduce((a,b)=>a+b,0)/trials.length))*100) };
                                $('#test-phase').textContent = '✓ Reaction test done!';
                                setTimeout(resolve, 400);
                            } else { setTimeout(startTrial, 350); }
                        } else if (!box.classList.contains('go') && box.style.background !== 'var(--grey)') {
                            box.textContent = 'Too early!';
                            setTimeout(startTrial, 600);
                        }
                    });
                    phase = 'testing';
                    startTrial();
                });
            }

            function runMemoryTest() {
                return new Promise(resolve => {
                    $('#test-phase').textContent = 'Test 2/4: Memory Grid';
                    const size = 4; const len = 6; const pattern = new Set();
                    while (pattern.size < len) pattern.add(Math.floor(Math.random() * (size*size)));
                    $('#test-area').innerHTML = `
                        <p id="mem-msg" style="color:var(--text2);margin-bottom:0.4rem;font-size:0.8rem;">Memorize (2 sec)</p>
                        <div class="mem-grid" style="grid-template-columns:repeat(${size},38px);" id="mem-grid">
                            ${Array.from({length:size*size}, (_,i) => `<div class="mem-cell ${pattern.has(i)?'on':''}" data-idx="${i}"></div>`).join('')}
                        </div>
                        <p style="color:var(--text2);margin-top:0.4rem;font-size:0.7rem;">Found: <span id="mem-found">0</span>/${len}</p>
                        <div class="prog"><div class="prog-fill" style="width:0%"></div></div>`;
                    let correct = 0, wrong = 0, phase = 'memorize';
                    setTimeout(() => {
                        phase = 'recall';
                        $('#mem-msg').textContent = 'Click the tiles you remember';
                        $$('#mem-grid .mem-cell').forEach(c => c.classList.remove('on'));
                    }, 2000);
                    $('#mem-grid').addEventListener('click', (e) => {
                        if (phase !== 'recall') return;
                        const cell = e.target.closest('.mem-cell');
                        if (!cell) return;
                        const idx = parseInt(cell.dataset.idx);
                        if (pattern.has(idx) && !cell.classList.contains('ok')) {
                            cell.classList.add('ok'); correct++;
                            $('#mem-found').textContent = correct;
                            $('.prog-fill').style.width = `${(correct/len)*100}%`;
                            if (correct >= len) {
                                state.testResults.memory = { score: Math.min(Math.round((correct/(correct+wrong))*20), 20), correct, mistakes: wrong };
                                $('#test-phase').textContent = '✓ Memory test done!';
                                setTimeout(resolve, 400);
                            }
                        } else if (!cell.classList.contains('ok')) {
                            cell.classList.add('bad'); wrong++;
                            setTimeout(() => cell.classList.remove('bad'), 250);
                        }
                    });
                });
            }

            function runNumberTest() {
                return new Promise(resolve => {
                    $('#test-phase').textContent = 'Test 3/4: Number Recall';
                    let span = 4;
                    function showNumber() {
                        const num = Array.from({length: span}, () => Math.floor(Math.random()*10)).join('');
                        $('#test-area').innerHTML = `
                            <p style="color:var(--text2);margin-bottom:0.4rem;font-size:0.8rem;">Remember this number</p>
                            <div class="num-big">${num}</div>
                            <p style="color:var(--text2);font-size:0.7rem;">Digit Span: ${span}</p>`;
                        setTimeout(() => {
                            $('#test-area').innerHTML = `
                                <p style="color:var(--text2);margin-bottom:0.4rem;font-size:0.8rem;">Enter the number</p>
                                <input type="text" class="num-inp" id="num-inp" maxlength="${span}" autofocus>
                                <p style="color:var(--text2);margin-top:0.4rem;font-size:0.7rem;">Digit Span: ${span}</p>
                                <button class="btn" id="num-submit" style="margin-top:0.4rem;">Submit</button>`;
                            $('#num-submit').addEventListener('click', () => checkNumber(num));
                            $('#num-inp').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkNumber(num); });
                            setTimeout(() => $('#num-inp')?.focus(), 100);
                        }, 1600);
                    }
                    function checkNumber(correct) {
                        const input = $('#num-inp')?.value;
                        if (input === correct && span < 10) { span++; alert('Correct! +1 span', 's'); showNumber(); }
                        else { state.testResults.number = { span: input === correct ? span : span - 1 }; $('#test-phase').textContent = '✓ Number recall done!'; resolve(); }
                    }
                    showNumber();
                });
            }

            function runFocusTest() {
                return new Promise(resolve => {
                    $('#test-phase').textContent = 'Test 4/4: Shape Focus';
                    const shapes = ['●','■','▲','◆'];
                    const target = shapes[Math.floor(Math.random()*shapes.length)];
                    let correct = 0, wrong = 0, round = 0;
                    const total = 10;
                    function makeGrid() {
                        const cells = [];
                        const tpos = Math.floor(Math.random()*9);
                        for (let i = 0; i < 9; i++) {
                            if (i === tpos) cells.push(target);
                            else { let s; do { s = shapes[Math.floor(Math.random()*shapes.length)]; } while (s === target); cells.push(s); }
                        }
                        $('#test-area').innerHTML = `
                            <p style="color:var(--text2);margin-bottom:0.4rem;font-size:0.8rem;">Tap only: <span style="font-size:1.2rem;">${target}</span></p>
                            <div class="shape-grid">${cells.map(s => `<div class="shape-cell" data-shape="${s}">${s}</div>`).join('')}</div>
                            <p style="color:var(--text2);margin-top:0.4rem;font-size:0.7rem;">Round: <span id="focus-round">${round+1}</span>/${total}</p>
                            <div class="prog"><div class="prog-fill" style="width:${(round/total)*100}%"></div></div>`;
                        $$('.shape-cell').forEach(c => {
                            c.addEventListener('click', () => {
                                if (c.dataset.shape === target) {
                                    c.classList.add('good'); correct++; round++;
                                    $('#focus-round').textContent = Math.min(round+1, total);
                                    $('.prog-fill').style.width = `${(round/total)*100}%`;
                                    if (round >= total) {
                                        state.testResults.focus = { accuracy: Math.round((correct/(correct+wrong))*100), correct, incorrect: wrong };
                                        $('#test-phase').textContent = '✓ Focus test done!';
                                        resolve();
                                    } else { setTimeout(makeGrid, 220); }
                                } else {
                                    c.classList.add('bad'); wrong++;
                                    setTimeout(() => c.classList.remove('bad'), 300);
                                }
                            });
                        });
                    }
                    makeGrid();
                });
            }

            function calcOverall() {
                const r = state.testResults.reaction ? Math.max(0, Math.min(100, (300 - state.testResults.reaction.avg)/2)) : 0;
                const m = state.testResults.memory ? (state.testResults.memory.score/20)*100 : 0;
                const n = state.testResults.number ? (state.testResults.number.span/10)*100 : 0;
                const f = state.testResults.focus?.accuracy || 0;
                return Math.round((r+m+n+f)/4);
            }

            async function saveSession() {
                const session = { ...state.sessionMeta, reaction_avg: state.testResults.reaction?.avg, reaction_best: state.testResults.reaction?.best, reaction_consistency: state.testResults.reaction?.consistency, memory_score: state.testResults.memory?.score, number_span: state.testResults.number?.span, focus_score: state.testResults.focus?.accuracy, overall_score: calcOverall(), item_names: state.sessionMeta.items.map(i => i.name).join(' + '), item_ids: state.sessionMeta.items.map(i => i.id) };
                await dbAdd('sessions', session);
            }

            function showResults() {
                $('#test-overlay').classList.remove('on');
                const m = state.sessionMeta, r = state.testResults;
                showModal(`
                    <h2>⬡ Session Complete!</h2>
                    <div style="margin:0.5rem 0;padding:0.5rem;background:var(--bg3);border-radius:8px;font-size:0.8rem;">
                        <h3>${esc(m.items.map(i=>i.name).join(' + '))}</h3>
                        ${m.timeSince ? `<p><strong>Time:</strong> ${m.timeSince}</p>` : ''}
                        ${m.tags?.length ? `<p><strong>Tags:</strong> ${m.tags.join(', ')}</p>` : ''}
                        ${m.notes ? `<p><strong>Notes:</strong> ${esc(m.notes)}</p>` : ''}
                    </div>
                    <div class="grid2">
                        <div class="stat"><div class="stat-val" style="font-size:1.2rem;">${r.reaction?.avg||'--'}ms</div><div class="stat-lbl">Reaction</div></div>
                        <div class="stat"><div class="stat-val" style="font-size:1.2rem;">${r.memory?.score||'--'}/20</div><div class="stat-lbl">Memory</div></div>
                        <div class="stat"><div class="stat-val" style="font-size:1.2rem;">${r.number?.span||'--'}</div><div class="stat-lbl">Digit Span</div></div>
                        <div class="stat"><div class="stat-val" style="font-size:1.2rem;">${r.focus?.accuracy||'--'}%</div><div class="stat-lbl">Focus</div></div>
                    </div>
                    <div style="text-align:center;margin:0.8rem 0;padding:0.8rem;background:var(--bg3);border:1px solid var(--grey);border-radius:10px;">
                        <div style="font-size:2rem;font-weight:700;">${calcOverall()}/100</div>
                        <div style="color:var(--text2);">Overall Score</div>
                    </div>
                    <div style="display:flex;gap:0.4rem;justify-content:center;flex-wrap:wrap;">
                        <button class="btn" onclick="startSession()">▶ New Session</button>
                        <button class="btn btn-o" onclick="hideModal();renderDashboard();">Done</button>
                    </div>`);
            }

            // ============================================================
            // ===== AI INSIGHTS TAB =====================================
            // ============================================================
            function generateInsights(sessions) {
                if (sessions.length === 0) {
                    return { insights: [], comparisons: [], predictions: [], conditions: [], experiments: [] };
                }

                const insights = [];
                const comparisons = [];
                let predictions = [];
                let conditions = [];

                // 1. Factor Analysis: tags
                const tagMap = {};
                const allTags = new Set();
                sessions.forEach(s => {
                    (s.tags||[]).forEach(t => {
                        allTags.add(t);
                        if (!tagMap[t]) tagMap[t] = [];
                        tagMap[t].push(s);
                    });
                });

                // For each tag with sessions, analyze impact
                allTags.forEach(tag => {
                    const withTag = tagMap[tag] || [];
                    const withoutTag = sessions.filter(s => !(s.tags||[]).includes(tag));
                    if (withTag.length < 2 || withoutTag.length < 2) return;

                    const avgWith = withTag.reduce((a,b) => a + (b.overall_score||0), 0) / withTag.length;
                    const avgWithout = withoutTag.reduce((a,b) => a + (b.overall_score||0), 0) / withoutTag.length;
                    const diff = avgWith - avgWithout;
                    const pctChange = avgWithout ? ((diff / avgWithout) * 100) : 0;
                    const evidence = withTag.length + withoutTag.length;

                    // Memory, reaction, focus analysis
                    const memWith = withTag.reduce((a,b) => a + (b.memory_score||0), 0) / withTag.length;
                    const memWithout = withoutTag.reduce((a,b) => a + (b.memory_score||0), 0) / withoutTag.length;
                    const reactWith = withTag.reduce((a,b) => a + (b.reaction_avg||0), 0) / withTag.length;
                    const reactWithout = withoutTag.reduce((a,b) => a + (b.reaction_avg||0), 0) / withoutTag.length;
                    const focusWith = withTag.reduce((a,b) => a + (b.focus_score||0), 0) / withTag.length;
                    const focusWithout = withoutTag.reduce((a,b) => a + (b.focus_score||0), 0) / withoutTag.length;

                    const memDiff = memWith - memWithout;
                    const reactDiff = reactWith - reactWithout;
                    const focusDiff = focusWith - focusWithout;

                    // Build insight statement
                    let statement = '';
                    const direction = diff > 0 ? 'higher' : 'lower';
                    const magnitude = Math.abs(diff);
                    if (magnitude > 2) {
                        statement = `Sessions tagged with "${tag}" are associated with ${direction} overall scores (${diff > 0 ? '+' : ''}${magnitude.toFixed(1)} points, ${Math.abs(pctChange).toFixed(0)}% ${diff > 0 ? 'better' : 'worse'})`;
                    } else {
                        statement = `"${tag}" shows minimal impact on overall score (${diff > 0 ? '+' : ''}${magnitude.toFixed(1)} points)`;
                    }

                    // Build detailed comparison card
                    const comp = {
                        tag,
                        sessionsWith: withTag.length,
                        sessionsWithout: withoutTag.length,
                        avgWith: Math.round(avgWith),
                        avgWithout: Math.round(avgWithout),
                        diff: Math.round(diff),
                        pctChange: Math.round(pctChange),
                        memDiff: Math.round(memDiff),
                        reactDiff: Math.round(reactDiff),
                        focusDiff: Math.round(focusDiff),
                        evidence: evidence,
                        statement: statement,
                        detailed: `Sessions with "${tag}": Avg ${Math.round(avgWith)} (${withTag.length} sessions) vs without: ${Math.round(avgWithout)} (${withoutTag.length} sessions) → ${diff > 0 ? '+' : ''}${diff.toFixed(0)} points`
                    };
                    comparisons.push(comp);

                    // Generate AI statement
                    let aiStatement = '';
                    const conf = evidence > 20 ? 'high' : evidence > 10 ? 'medium' : 'low';
                    const confLabel = conf === 'high' ? 'Strong' : conf === 'medium' ? 'Moderate' : 'Limited';

                    if (Math.abs(diff) > 3) {
                        const dirText = diff > 0 ? 'improves' : 'lowers';
                        const area = Math.abs(memDiff) > Math.abs(focusDiff) ? 'memory' : Math.abs(focusDiff) > Math.abs(reactDiff) ? 'focus' : 'reaction';
                        if (tag.includes('Caffeine') || tag.includes('☕') || tag.includes('caffeine')) {
                            aiStatement = `Caffeine appears to ${diff > 0 ? 'improve' : 'reduce'} overall performance by ${Math.abs(diff).toFixed(0)} points. Reaction speed is ${reactDiff < 0 ? 'faster' : 'slower'} by ${Math.abs(reactDiff).toFixed(0)}ms. Evidence: ${confLabel} (${evidence} sessions).`;
                        } else if (tag.includes('Cannabis') || tag.includes('🌿') || tag.includes('cannabis')) {
                            aiStatement = `Cannabis sessions show ${memDiff < 0 ? 'lower' : 'higher'} memory scores by ${Math.abs(memDiff).toFixed(0)} points and ${reactDiff < 0 ? 'faster' : 'slower'} reaction by ${Math.abs(reactDiff).toFixed(0)}ms. Evidence: ${confLabel} (${evidence} sessions).`;
                        } else if (tag.includes('Sleep') || tag.includes('😴') || tag.includes('sleep')) {
                            aiStatement = `Sleep quality is strongly associated with performance. ${diff > 0 ? 'Better sleep correlates with higher' : 'Poor sleep correlates with lower'} scores (${Math.abs(diff).toFixed(0)} point difference). Evidence: ${confLabel} (${evidence} sessions).`;
                        } else if (tag.includes('Stress') || tag.includes('😰') || tag.includes('stress')) {
                            aiStatement = `Stress levels show a ${diff > 0 ? 'positive' : 'negative'} correlation with performance. ${diff > 0 ? 'Lower stress' : 'Higher stress'} is associated with ${Math.abs(diff).toFixed(0)} point ${diff > 0 ? 'improvement' : 'decline'}. Evidence: ${confLabel} (${evidence} sessions).`;
                        } else {
                            aiStatement = `"${tag}" is associated with ${diff > 0 ? 'higher' : 'lower'} scores (${Math.abs(diff).toFixed(0)} points). ${area} shows the strongest ${Math.abs(memDiff) > Math.abs(focusDiff) ? 'memory' : 'focus'} difference. Evidence: ${confLabel} (${evidence} sessions).`;
                        }
                    } else {
                        aiStatement = `"${tag}" shows no significant correlation with performance (${Math.abs(diff).toFixed(0)} point difference). More data needed for reliable insights. Evidence: ${confLabel} (${evidence} sessions).`;
                    }

                    insights.push({
                        tag,
                        statement: aiStatement,
                        evidence,
                        confidence: conf,
                        diff: diff,
                        sessions: withTag.length,
                    });
                });

                // 2. Time Analysis: find best time of day
                const timeMap = {};
                sessions.forEach(s => {
                    const d = new Date(s.date);
                    const hour = d.getHours();
                    const period = hour >= 6 && hour < 12 ? 'morning' : hour >= 12 && hour < 17 ? 'afternoon' : hour >= 17 && hour < 21 ? 'evening' : 'night';
                    if (!timeMap[period]) timeMap[period] = [];
                    timeMap[period].push(s);
                });

                let bestTime = 'No data';
                let bestScore = 0;
                Object.entries(timeMap).forEach(([period, sess]) => {
                    const avg = sess.reduce((a,b) => a + (b.overall_score||0), 0) / sess.length;
                    if (avg > bestScore && sess.length > 1) {
                        bestScore = avg;
                        bestTime = period;
                    }
                });

                if (bestTime !== 'No data') {
                    insights.push({
                        tag: `⏰ Best Time: ${bestTime}`,
                        statement: `Your highest scores occur during the ${bestTime} (${Math.round(bestScore)} avg). Consider scheduling tests during this time for optimal performance.`,
                        evidence: Object.values(timeMap).reduce((a,b) => a + b.length, 0),
                        confidence: 'medium',
                        diff: 0,
                        sessions: Object.values(timeMap).reduce((a,b) => a + b.length, 0),
                    });
                }

                // 3. Predictions
                if (sessions.length >= 3) {
                    const avgOverall = sessions.reduce((a,b) => a + (b.overall_score||0), 0) / sessions.length;
                    let predicted = Math.round(avgOverall);
                    // Adjust based on common factors
                    const hasCaffeine = sessions.some(s => (s.tags||[]).some(t => t.includes('Caffeine') || t.includes('☕')));
                    const hasSleep = sessions.some(s => (s.tags||[]).some(t => t.includes('Sleep') || t.includes('😴')));
                    const hasStress = sessions.some(s => (s.tags||[]).some(t => t.includes('Stress') || t.includes('😰')));

                    let factorNote = 'Based on your average performance';
                    if (hasCaffeine) predicted += 3;
                    if (hasSleep) predicted += 5;
                    if (hasStress) predicted -= 4;

                    predicted = Math.max(0, Math.min(100, predicted));

                    predictions.push({
                        score: predicted,
                        note: `Expected focus score: ${predicted}%`,
                        factors: `Based on your current factors (${hasCaffeine ? 'caffeine consumed' : 'no caffeine'}, ${hasSleep ? 'good sleep' : 'sleep unknown'}, ${hasStress ? 'stress present' : 'low stress'})`,
                    });

                    // Conditions ranking
                    const tagScores = {};
                    allTags.forEach(tag => {
                        const withTag = tagMap[tag] || [];
                        if (withTag.length < 2) return;
                        const avg = withTag.reduce((a,b) => a + (b.overall_score||0), 0) / withTag.length;
                        tagScores[tag] = Math.round(avg);
                    });
                    const sorted = Object.entries(tagScores).sort((a,b) => b[1] - a[1]);
                    if (sorted.length >= 2) {
                        conditions = sorted.slice(0, 3).map(([tag, score]) => ({
                            tag,
                            score,
                            detail: `${tag} → Avg Score: ${score}`
                        }));
                    }
                }

                // 4. Suggest experiments
                const suggestedExperiments = [];
                // Check if caffeine is being tracked
                const hasCaffeineTag = sessions.some(s => (s.tags||[]).some(t => t.includes('Caffeine') || t.includes('☕')));
                const hasSleepTag = sessions.some(s => (s.tags||[]).some(t => t.includes('Sleep') || t.includes('😴')));
                const hasCannabisTag = sessions.some(s => (s.tags||[]).some(t => t.includes('Cannabis') || t.includes('🌿')));

                if (!hasCaffeineTag && sessions.length > 2) {
                    suggestedExperiments.push({
                        name: 'Caffeine Effect',
                        variable: 'Caffeine',
                        description: 'Test caffeine\'s effect on reaction speed. Complete 7 sessions with caffeine and 7 without for comparison.',
                        target: 14,
                    });
                }
                if (!hasSleepTag && sessions.length > 2) {
                    suggestedExperiments.push({
                        name: 'Sleep Impact',
                        variable: 'Sleep',
                        description: 'Track sleep duration (6h vs 8h+) to measure impact on memory and focus. Target: 10 sessions per condition.',
                        target: 20,
                    });
                }
                if (!hasCannabisTag && sessions.length > 2) {
                    suggestedExperiments.push({
                        name: 'Cannabis vs Sober',
                        variable: 'Cannabis',
                        description: 'Compare performance between cannabis sessions and sober sessions. Target: 7 sessions each.',
                        target: 14,
                    });
                }

                return { insights, comparisons, predictions, conditions, experiments: suggestedExperiments };
            }

            // --- ANALYTICS with AI Insights Tab ---
            async function renderAnalytics() {
                const sessions = await dbAll('sessions');
                const items = await dbAll('items');
                const goals = await dbAll('goals');
                const experiments = await dbAll('experiments');

                // Generate insights
                const { insights, comparisons, predictions, conditions, experiments: suggestedExps } = generateInsights(sessions);

                $('#main-content').innerHTML = `
                    <h2 style="margin-bottom:0.6rem;">Analytics</h2>
                    <div class="analytics-subnav">
                        <button class="btn ${state.analyticsSub === 'insights' ? 'active' : ''}" onclick="switchAnalytics('insights')">🧠 AI Insights</button>
                        <button class="btn ${state.analyticsSub === 'stats' ? 'active' : ''}" onclick="switchAnalytics('stats')">📊 Stats</button>
                        <button class="btn ${state.analyticsSub === 'graphs' ? 'active' : ''}" onclick="switchAnalytics('graphs')">📈 Graphs</button>
                        <button class="btn ${state.analyticsSub === 'profile' ? 'active' : ''}" onclick="switchAnalytics('profile')">🧠 Profile</button>
                        <button class="btn ${state.analyticsSub === 'compare' ? 'active' : ''}" onclick="switchAnalytics('compare')">⚖️ Compare</button>
                        <button class="btn ${state.analyticsSub === 'goals' ? 'active' : ''}" onclick="switchAnalytics('goals')">🎯 Goals</button>
                        <button class="btn ${state.analyticsSub === 'experiments' ? 'active' : ''}" onclick="switchAnalytics('experiments')">🧪 Experiments</button>
                    </div>
                    <div id="analytics-content">
                        ${state.analyticsSub === 'insights' ? renderInsightsTab(sessions, insights, comparisons, predictions, conditions, suggestedExps) :
                          state.analyticsSub === 'stats' ? renderStatsTab(sessions, items) :
                          state.analyticsSub === 'graphs' ? renderGraphsTab(sessions, items) :
                          state.analyticsSub === 'profile' ? renderProfileTab(sessions) :
                          state.analyticsSub === 'compare' ? renderCompareTab(sessions) :
                          state.analyticsSub === 'goals' ? renderGoalsTab(sessions, goals) :
                          renderExperimentsTab(sessions, experiments)}
                    </div>
                `;
            }

            function switchAnalytics(sub) {
                state.analyticsSub = sub;
                renderAnalytics();
            }

            // ============================================================
            // ===== RENDER AI INSIGHTS TAB ===============================
            // ============================================================
            function renderInsightsTab(sessions, insights, comparisons, predictions, conditions, suggestedExps) {
                if (sessions.length === 0) {
                    return `<div class="card"><p style="color:var(--text2);">Complete at least 3 sessions to generate AI insights.</p></div>`;
                }

                let html = '';

                // AI Insights cards
                html += `<div class="card"><h3>🧠 AI Generated Insights</h3>`;
                if (insights.length === 0) {
                    html += `<p style="color:var(--text2);">Not enough data for insights. Complete more sessions.</p>`;
                } else {
                    insights.forEach(ins => {
                        const conf = ins.confidence === 'high' ? 'conf-high' : ins.confidence === 'medium' ? 'conf-medium' : 'conf-low';
                        const confLabel = ins.confidence === 'high' ? 'Strong' : ins.confidence === 'medium' ? 'Moderate' : 'Limited';
                        html += `
                            <div class="insight-card">
                                <div style="font-weight:600;">${esc(ins.tag)}</div>
                                <div style="font-size:0.85rem;margin:0.2rem 0;">${esc(ins.statement)}</div>
                                <div class="evidence">
                                    Evidence Strength: <span class="conf-badge ${conf}">${confLabel}</span> (${ins.evidence} sessions)
                                    ${ins.sessions ? ` • ${ins.sessions} sessions` : ''}
                                </div>
                            </div>
                        `;
                    });
                }
                html += `</div>`;

                // Comparison Cards
                html += `<div class="card"><h3>📊 Comparison Cards</h3>`;
                if (comparisons.length === 0) {
                    html += `<p style="color:var(--text2);">Complete more sessions with varied tags to see comparisons.</p>`;
                } else {
                    comparisons.slice(0, 4).forEach(c => {
                        const diffColor = c.diff > 0 ? 'var(--green)' : c.diff < 0 ? 'var(--red)' : 'var(--text2)';
                        html += `
                            <div style="background:var(--bg3);border-radius:8px;padding:0.5rem;margin:0.3rem 0;border-left:3px solid ${diffColor};">
                                <div style="display:flex;justify-content:space-between;flex-wrap:wrap;font-size:0.8rem;">
                                    <span><strong>${esc(c.tag)}</strong></span>
                                    <span style="color:var(--text2);">${c.evidence} sessions</span>
                                </div>
                                <div style="display:flex;justify-content:space-between;flex-wrap:wrap;font-size:0.7rem;margin-top:0.2rem;">
                                    <span>With: ${c.avgWith}</span>
                                    <span>Without: ${c.avgWithout}</span>
                                    <span class="diff" style="color:${diffColor};">${c.diff > 0 ? '+' : ''}${c.diff} pts</span>
                                </div>
                                ${c.memDiff || c.reactDiff || c.focusDiff ? `
                                    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;font-size:0.65rem;color:var(--text2);margin-top:0.15rem;">
                                        ${c.memDiff ? `<span>Memory: ${c.memDiff > 0 ? '+' : ''}${c.memDiff}</span>` : ''}
                                        ${c.reactDiff ? `<span>Reaction: ${c.reactDiff < 0 ? '' : '+'}${c.reactDiff}ms</span>` : ''}
                                        ${c.focusDiff ? `<span>Focus: ${c.focusDiff > 0 ? '+' : ''}${c.focusDiff}%</span>` : ''}
                                    </div>
                                ` : ''}
                            </div>
                        `;
                    });
                }
                html += `</div>`;

                // Predictions
                html += `<div class="card"><h3>🔮 Predictions</h3>`;
                if (predictions.length === 0) {
                    html += `<p style="color:var(--text2);">Need more sessions for predictions.</p>`;
                } else {
                    predictions.forEach(p => {
                        html += `
                            <div class="prediction-box">
                                <div class="score">${p.score}%</div>
                                <div style="font-size:0.8rem;">${esc(p.note)}</div>
                                <div style="font-size:0.65rem;color:var(--text2);margin-top:0.2rem;">${esc(p.factors)}</div>
                            </div>
                        `;
                    });
                }
                html += `</div>`;

                // Performance Conditions Ranking
                html += `<div class="card"><h3>🏆 Performance Conditions Ranking</h3>`;
                if (conditions.length === 0) {
                    html += `<p style="color:var(--text2);">Need more data for ranking.</p>`;
                } else {
                    conditions.forEach((c, i) => {
                        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉';
                        html += `
                            <div class="comparison-row">
                                <span>${medal} ${esc(c.tag)}</span>
                                <span style="font-weight:600;">Avg Score: ${c.score}</span>
                            </div>
                        `;
                    });
                }
                html += `</div>`;

                // Suggested Experiments
                html += `<div class="card"><h3>🧪 Suggested Experiments</h3>`;
                if (suggestedExps.length === 0) {
                    html += `<p style="color:var(--text2);">No experiments suggested yet. Keep testing!</p>`;
                } else {
                    suggestedExps.forEach(e => {
                        html += `
                            <div style="background:var(--bg3);border-radius:8px;padding:0.5rem;margin:0.3rem 0;border-left:3px solid var(--blue);">
                                <div style="font-weight:600;">${esc(e.name)}</div>
                                <div style="font-size:0.75rem;color:var(--text2);">${esc(e.description)}</div>
                                <div style="font-size:0.65rem;color:var(--text2);margin-top:0.15rem;">Target: ${e.target} sessions</div>
                                <button class="btn btn-blue btn-s" onclick="alert('Experiment added to your list!','s')">➕ Add Experiment</button>
                            </div>
                        `;
                    });
                }
                html += `</div>`;

                return html;
            }

            // --- STATS TAB (simplified) ---
            function renderStatsTab(sessions, items) {
                const compNames = new Set();
                items.forEach(item => { (item.components||[]).forEach(c => compNames.add(c.name)); });
                let compOptions = '<option value="">Select...</option>';
                compNames.forEach(n => { compOptions += `<option value="${esc(n)}">${esc(n)}</option>`; });

                return `
                    <div class="card">
                        <h3>Component Statistics</h3>
                        <div style="display:flex;gap:0.4rem;margin:0.4rem 0;flex-wrap:wrap;">
                            <select class="f-input" id="stats-comp-select" onchange="updateStats()" style="flex:2;min-width:100px;">${compOptions}</select>
                            <select class="f-input" id="stats-metric-select" onchange="updateStats()" style="flex:1;min-width:70px;">
                                <option value="overall_score">Overall</option>
                                <option value="reaction_avg">Reaction</option>
                                <option value="memory_score">Memory</option>
                                <option value="focus_score">Focus</option>
                            </select>
                        </div>
                        <div id="stats-detail"><p style="color:var(--text2);">Select a component to see stats</p></div>
                    </div>
                `;
            }

            window.updateStats = function() {
                const comp = document.getElementById('stats-comp-select')?.value;
                const metric = document.getElementById('stats-metric-select')?.value || 'overall_score';
                if (!comp) return;
                // Simple stats display
                document.getElementById('stats-detail').innerHTML = `
                    <p style="color:var(--text2);">Analyzing component: ${esc(comp)}... Use the Graphs tab for visualizations.</p>
                    <p style="color:var(--text2);font-size:0.7rem;">Tip: The AI Insights tab automatically analyzes all factors!</p>
                `;
            };

            // --- GRAPHS TAB (simplified) ---
            function renderGraphsTab(sessions, items) {
                const hasData = sessions.length > 0;
                return `
                    <div class="card">
                        <h3>Performance Timeline</h3>
                        <div id="timeline-graph">
                            ${hasData ? drawTimeline(sessions) : '<p style="color:var(--text2);">Complete tests to generate graphs.</p>'}
                        </div>
                    </div>
                    <div class="grid2">
                        <div class="card">
                            <h3>Correlation Graph</h3>
                            <div id="correlation-graph">
                                ${hasData ? drawCorrelation(sessions) : '<p style="color:var(--text2);">Need at least 1 session</p>'}
                            </div>
                        </div>
                        <div class="card">
                            <h3>Trend Detection</h3>
                            <div id="trend-detection">
                                ${sessions.length >= 2 ? drawTrend(sessions) : '<p style="color:var(--text2);">Need 2+ sessions for trends</p>'}
                            </div>
                        </div>
                    </div>
                    <div class="card">
                        <h3>Heatmap Calendar</h3>
                        <div id="heatmap">${hasData ? drawHeatmap(sessions) : '<p style="color:var(--text2);">No data yet</p>'}</div>
                    </div>
                `;
            }

            function drawTimeline(sessions) {
                const sorted = sessions.sort((a,b) => new Date(a.date) - new Date(b.date));
                const data = sorted.slice(-14).map(s => ({ date: new Date(s.date).toLocaleDateString(), score: s.overall_score || 0 }));
                const w = 460, h = 150, pad = 20;
                if (data.length === 0) return '<p style="color:var(--text2);">No data</p>';
                const max = Math.max(...data.map(d => d.score), 50);
                const min = Math.min(...data.map(d => d.score), 0);
                const range = max - min || 1;
                const pts = data.map((d,i) => ({
                    x: pad + (i/(data.length-1||1))*(w-2*pad),
                    y: h - pad - ((d.score-min)/range)*(h-2*pad),
                    label: d.date,
                    val: d.score
                }));
                const path = pts.map((p,i) => `${i===0?'M':'L'} ${p.x} ${p.y}`).join(' ');
                return `<div class="graph-box"><svg viewBox="0 0 ${w} ${h}">
                    <line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="#333" stroke-width="1"/>
                    <line x1="${pad}" y1="${pad}" x2="${pad}" y2="${h-pad}" stroke="#333" stroke-width="1"/>
                    <path d="${path}" fill="none" stroke="#fff" stroke-width="2"/>
                    ${pts.map(p => `<circle cx="${p.x}" cy="${p.y}" r="3" fill="#fff"><title>${p.label}: ${p.val}</title></circle>`).join('')}
                    <text x="${w/2}" y="${h-4}" fill="#666" font-size="8" text-anchor="middle">Recent sessions</text>
                </svg></div>`;
            }

            function drawCorrelation(sessions) {
                const data = sessions.filter(s => s.overall_score != null && s.reaction_avg != null);
                if (data.length === 0) return '<p style="color:var(--text2);">Not enough data</p>';
                const w = 460, h = 150, pad = 20;
                const maxScore = Math.max(...data.map(d => d.overall_score), 50);
                const minScore = Math.min(...data.map(d => d.overall_score), 0);
                const maxReaction = Math.max(...data.map(d => d.reaction_avg), 200);
                const minReaction = Math.min(...data.map(d => d.reaction_avg), 100);
                const rangeS = maxScore - minScore || 1;
                const rangeR = maxReaction - minReaction || 1;
                const pts = data.map(d => ({
                    x: pad + ((d.overall_score - minScore)/rangeS)*(w-2*pad),
                    y: h - pad - ((d.reaction_avg - minReaction)/rangeR)*(h-2*pad)
                }));
                const dots = pts.map(p => `<circle cx="${p.x}" cy="${p.y}" r="3" fill="#4a4"/>`).join('');
                return `<div class="graph-box"><svg viewBox="0 0 ${w} ${h}">
                    <line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="#333" stroke-width="1"/>
                    <line x1="${pad}" y1="${pad}" x2="${pad}" y2="${h-pad}" stroke="#333" stroke-width="1"/>
                    ${dots}
                    <text x="${w/2}" y="${h-4}" fill="#666" font-size="8" text-anchor="middle">Score vs Reaction</text>
                </svg></div>`;
            }

            function drawTrend(sessions) {
                const sorted = sessions.sort((a,b) => new Date(a.date) - new Date(b.date));
                const vals = sorted.map(s => s.overall_score || 0);
                const mid = Math.floor(vals.length/2);
                const first = vals.slice(0,mid).reduce((a,b)=>a+b,0)/mid;
                const second = vals.slice(mid).reduce((a,b)=>a+b,0)/(vals.length-mid);
                const pct = ((second-first)/first)*100;
                const better = pct > 0;
                return `<div style="padding:0.4rem;">
                    <p style="font-size:1.1rem;">${better ? '📈 Improving' : '📉 Declining'}</p>
                    <p style="color:var(--text2);">${pct > 0 ? '+' : ''}${pct.toFixed(1)}% over ${vals.length} sessions</p>
                </div>`;
            }

            function drawHeatmap(sessions) {
                const now = new Date();
                const weekAgo = new Date(now);
                weekAgo.setDate(weekAgo.getDate() - 6);
                const days = [];
                for (let d = new Date(weekAgo); d <= now; d.setDate(d.getDate()+1)) {
                    const dateStr = d.toDateString();
                    const s = sessions.find(ses => new Date(ses.date).toDateString() === dateStr);
                    const score = s?.overall_score || 0;
                    let cls = 'none';
                    if (score >= 80) cls = 'high';
                    else if (score >= 50) cls = 'medium';
                    else if (score > 0) cls = 'low';
                    days.push({ date: d.toLocaleDateString(), cls, score });
                }
                return `<div class="heatmap-grid">${days.map(d => `<div class="heatmap-cell ${d.cls}" title="${d.date}: ${d.score}">${d.cls === 'high' ? '🟩' : d.cls === 'medium' ? '🟨' : d.cls === 'low' ? '🟥' : '⬛'}</div>`).join('')}</div>
                        <p style="color:var(--text2);font-size:0.6rem;">🟩 High • 🟨 Avg • 🟥 Low • ⬛ No test</p>`;
            }

            // --- PROFILE TAB ---
            function renderProfileTab(sessions) {
                if (sessions.length === 0) return `<div class="card"><p style="color:var(--text2);">Complete tests to build your profile.</p></div>`;
                const avgFocus = Math.round(sessions.reduce((a,b) => a + (b.focus_score||0), 0) / sessions.length);
                const avgMemory = Math.round(sessions.reduce((a,b) => a + (b.memory_score||0), 0) / sessions.length);
                const avgReaction = Math.round(sessions.reduce((a,b) => a + (b.reaction_avg||0), 0) / sessions.length);
                const avgOverall = Math.round(sessions.reduce((a,b) => a + (b.overall_score||0), 0) / sessions.length);
                const problemSolving = Math.min(100, Math.round((avgMemory + avgFocus)/2));

                const stats = [
                    { label: 'Focus', val: avgFocus, max: 100 },
                    { label: 'Memory', val: avgMemory, max: 20 },
                    { label: 'Reaction', val: Math.max(0, 100 - Math.round(avgReaction/3)), max: 100, labelSuffix: 'ms' },
                    { label: 'Problem Solving', val: problemSolving, max: 100 },
                ];

                return `<div class="card">
                    <h3>🧠 Personal Performance Profile</h3>
                    ${stats.map(s => `
                        <div class="profile-stat">
                            <span class="label">${s.label}</span>
                            <div class="bar"><div class="bar-fill" style="width:${Math.min(100, (s.val/s.max)*100)}%;background:${s.val > s.max/2 ? 'var(--green)' : 'var(--yellow)'};"></div></div>
                            <span class="value">${s.val}${s.labelSuffix||''}</span>
                        </div>
                    `).join('')}
                    <div style="margin-top:0.4rem;padding:0.4rem;background:var(--bg3);border-radius:6px;">
                        <p style="color:var(--text2);font-size:0.7rem;">Based on ${sessions.length} sessions • Avg Overall: ${avgOverall}/100</p>
                    </div>
                </div>`;
            }

            // --- COMPARE TAB ---
            function renderCompareTab(sessions) {
                if (sessions.length < 2) return `<div class="card"><p style="color:var(--text2);">Need at least 2 sessions to compare.</p></div>`;
                const sorted = sessions.sort((a,b) => new Date(a.date) - new Date(b.date));
                const mid = Math.floor(sorted.length/2);
                const oldS = sorted.slice(0, mid);
                const newS = sorted.slice(mid);
                const oldAvg = Math.round(oldS.reduce((a,b)=>a+(b.overall_score||0),0)/oldS.length);
                const newAvg = Math.round(newS.reduce((a,b)=>a+(b.overall_score||0),0)/newS.length);
                const change = ((newAvg - oldAvg)/oldAvg)*100;

                return `<div class="card">
                    <h3>⚖️ Version Comparison</h3>
                    <div class="grid2">
                        <div class="stat"><div class="stat-val" style="font-size:1.4rem;">${oldAvg}</div><div class="stat-lbl">Earlier (${oldS.length} sessions)</div></div>
                        <div class="stat"><div class="stat-val" style="font-size:1.4rem;">${newAvg}</div><div class="stat-lbl">Recent (${newS.length} sessions)</div></div>
                    </div>
                    <div style="text-align:center;padding:0.6rem;background:var(--bg3);border-radius:8px;margin-top:0.4rem;">
                        <span style="font-size:1.2rem;color:${change > 0 ? 'var(--green)' : 'var(--red)'};">${change > 0 ? '📈' : '📉'} ${change > 0 ? '+' : ''}${change.toFixed(1)}%</span>
                        <span style="color:var(--text2);margin-left:0.3rem;">improvement</span>
                    </div>
                </div>`;
            }

            // --- GOALS TAB ---
            function renderGoalsTab(sessions, goals) {
                const current = sessions.length > 0 ? Math.round(sessions.reduce((a,b)=>a+(b.overall_score||0),0)/sessions.length) : 0;
                let goalHTML = goals.length === 0 ? '<p style="color:var(--text2);">No goals set.</p>' :
                    goals.map(g => {
                        const progress = Math.min(100, Math.round((current / g.target) * 100));
                        return `<div style="margin:0.3rem 0;padding:0.4rem;background:var(--bg3);border-radius:6px;">
                            <div style="display:flex;justify-content:space-between;font-size:0.8rem;">
                                <span><strong>${esc(g.name)}</strong></span>
                                <span>${current} → ${g.target}</span>
                            </div>
                            <div class="goal-bar"><div class="goal-bar-fill" style="width:${progress}%;background:${progress >= 100 ? 'var(--green)' : 'var(--yellow)'};"></div></div>
                            <span style="color:var(--text2);font-size:0.6rem;">${progress}% complete</span>
                            <button class="btn btn-r btn-s" onclick="deleteGoal(${g.id})" style="float:right;">✕</button>
                        </div>`;
                    }).join('');

                return `<div class="card">
                    <h3>🎯 Goals</h3>
                    ${goalHTML}
                    <div style="margin-top:0.6rem;">
                        <form onsubmit="addGoal(event)" style="display:flex;gap:0.2rem;flex-wrap:wrap;">
                            <input type="text" class="f-input" id="goal-name" placeholder="Goal name" style="flex:2;min-width:80px;" required>
                            <input type="number" class="f-input" id="goal-target" placeholder="Target" style="flex:1;min-width:60px;" required>
                            <button type="submit" class="btn btn-s">Add Goal</button>
                        </form>
                    </div>
                </div>`;
            }

            window.addGoal = async function(e) {
                e.preventDefault();
                const name = document.getElementById('goal-name')?.value;
                const target = parseInt(document.getElementById('goal-target')?.value);
                if (!name || !target) return;
                await dbAdd('goals', { name, target, metric: 'overall_score', created: new Date().toISOString() });
                alert('Goal added!', 's');
                renderAnalytics();
            };
            window.deleteGoal = async function(id) {
                if (confirm('Delete goal?')) { await dbDel('goals', id); renderAnalytics(); }
            };

            // --- EXPERIMENTS TAB ---
            function renderExperimentsTab(sessions, experiments) {
                let expHTML = experiments.length === 0 ? '<p style="color:var(--text2);">No experiments yet.</p>' :
                    experiments.map(e => {
                        const relevant = sessions.filter(s => s.item_names?.includes(e.variable));
                        const avg = relevant.length ? Math.round(relevant.reduce((a,b)=>a+(b.overall_score||0),0)/relevant.length) : 0;
                        return `<div style="margin:0.3rem 0;padding:0.4rem;background:var(--bg3);border-radius:6px;border-left:3px solid var(--text2);">
                            <div style="display:flex;justify-content:space-between;flex-wrap:wrap;font-size:0.8rem;">
                                <span><strong>${esc(e.name)}</strong> (${esc(e.variable)})</span>
                                <span style="color:var(--text2);font-size:0.65rem;">${relevant.length} sessions • Avg: ${avg}</span>
                            </div>
                            <p style="color:var(--text2);font-size:0.65rem;">${esc(e.description||'')}</p>
                            <button class="btn btn-r btn-s" onclick="deleteExperiment(${e.id})">✕</button>
                        </div>`;
                    }).join('');

                return `<div class="card">
                    <h3>🧪 Experiment Mode</h3>
                    ${expHTML}
                    <div style="margin-top:0.6rem;">
                        <form onsubmit="addExperiment(event)" style="display:flex;gap:0.2rem;flex-wrap:wrap;">
                            <input type="text" class="f-input" id="exp-name" placeholder="Experiment name" style="flex:2;min-width:70px;" required>
                            <input type="text" class="f-input" id="exp-variable" placeholder="Variable" style="flex:1;min-width:60px;" required>
                            <input type="text" class="f-input" id="exp-desc" placeholder="Description" style="flex:2;min-width:70px;">
                            <button type="submit" class="btn btn-s">Create</button>
                        </form>
                    </div>
                </div>`;
            }

            window.addExperiment = async function(e) {
                e.preventDefault();
                const name = document.getElementById('exp-name')?.value;
                const variable = document.getElementById('exp-variable')?.value;
                const description = document.getElementById('exp-desc')?.value || '';
                if (!name || !variable) return;
                await dbAdd('experiments', { name, variable, description, created: new Date().toISOString() });
                alert('Experiment created!', 's');
                renderAnalytics();
            };
            window.deleteExperiment = async function(id) {
                if (confirm('Delete experiment?')) { await dbDel('experiments', id); renderAnalytics(); }
            };

            // --- EXPORT ---
            window.exportData = async function() {
                const data = { exportDate: new Date().toISOString(), sessions: await dbAll('sessions'), items: await dbAll('items'), goals: await dbAll('goals'), experiments: await dbAll('experiments') };
                const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `logostics-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
                alert('Exported!', 's');
            };

            function esc(str) { if (!str) return ''; const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }

            // --- INIT ---
            async function init() {
                await openDB();
                $$('.nav-tab').forEach(tab => {
                    tab.addEventListener('click', () => switchTab(tab.dataset.tab));
                });
                $('#modal').addEventListener('click', (e) => { if (e.target === $('#modal')) hideModal(); });
                window.switchTab = switchTab;
                window.switchAnalytics = switchAnalytics;
                window.updateStats = updateStats;
                window.viewSession = viewSession;
                window.deleteSession = deleteSession;
                window.clearAllSessions = clearAllSessions;
                window.hideModal = hideModal;
                window.esc = esc;
                window.renderDashboard = renderDashboard;
                window.renderAnalytics = renderAnalytics;
                window.addGoal = addGoal;
                window.deleteGoal = deleteGoal;
                window.addExperiment = addExperiment;
                window.deleteExperiment = deleteExperiment;
                renderDashboard();
            }

            init().catch(console.error);
        })();
    </script>
</body>
</html>
