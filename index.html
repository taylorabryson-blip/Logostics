                            <span id="photo-status" style="color:var(--text2);font-size:0.6rem;margin-left:0.3rem;">No photo</span>
                            <img id="session-photo-preview" style="display:none;max-width:80px;max-height:80px;border-radius:6px;margin-top:0.2rem;border:1px solid var(--grey);">
                        </div>
                        <div style="display:flex;gap:0.3rem;margin-top:0.6rem;flex-wrap:wrap;"><button type="submit" class="btn">▶ Start Tests</button><button type="button" class="btn btn-o" onclick="hideModal()">Cancel</button></div>
                    </form>`);
                document.getElementById('intake-time')?.addEventListener('change', function() {
                    document.getElementById('custom-intake-time')?.classList.toggle('hidden', this.value !== 'custom');
                });
            };

            window.recordVoiceNote = function() {
                if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                    alert('Voice recording not supported in this browser.', 'w');
                    return;
                }
                const recognition = new(window.SpeechRecognition || window.webkitSpeechRecognition)();
                recognition.lang = 'en-US';
                recognition.interimResults = false;
                recognition.onresult = function(event) {
                    const transcript = event.results[0][0].transcript;
                    state.sessionVoiceNote = transcript;
                    document.getElementById('voice-status').textContent = '✅ Recorded';
                    alert('Voice note recorded!', 's');
                };
                recognition.onerror = function() {
                    alert('Voice recording failed. Please type your notes instead.', 'w');
                };
                recognition.start();
                document.getElementById('voice-status').textContent = '🎤 Recording...';
            };

            window.handleSessionPhoto = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    state.sessionPhoto = ev.target.result;
                    document.getElementById('photo-status').textContent = '✅ Attached';
                    const img = document.getElementById('session-photo-preview');
                    img.src = ev.target.result;
                    img.style.display = 'block';
                };
                reader.readAsDataURL(file);
            };

            window.toggleSessionTag = function(el) {
                el.classList.toggle('sel');
                const tag = el.dataset.tag;
                if (el.classList.contains('sel')) { if (!state.sessionTags.includes(tag)) state.sessionTags.push(tag); } else
                { state.sessionTags = state.sessionTags.filter(t => t !== tag); }
            };
            window.addSessionTag = function() {
                const input = document.getElementById('new-session-tag');
                if (!input) return;
                const tag = input.value.trim();
                if (tag && !state.sessionTags.includes(tag)) { state.sessionTags.push(tag);
                    renderSessionCustomTags(); }
                input.value = '';
                input.focus();
            };

            function renderSessionCustomTags() {
                const container = document.getElementById('session-tags-custom');
                if (!container) return;
                container.innerHTML = state.sessionTags.map(t =>
                    `<span class="tag sel del" onclick="removeSessionTag('${esc(t)}')">${esc(t)} ×</span>`).join('');
            }
            window.removeSessionTag = function(tag) {
                state.sessionTags = state.sessionTags.filter(t => t !== tag);
                renderSessionCustomTags();
                $$('#session-form .tag.sel').forEach(el => { if (el.dataset.tag === tag) el.classList.remove('sel'); });
            };

            window.beginTests = async function(e) {
                e.preventDefault();
                const checkboxes = document.querySelectorAll('#session-form input[type="checkbox"]:checked');
                const items = Array.from(checkboxes).map(cb => ({ id: parseInt(cb.value), name: cb.dataset.name }));
                if (items.length === 0) { alert('Select at least one item!', 'w'); return; }
                const intakeSelect = document.getElementById('intake-time');
                let timeSince = intakeSelect?.value || 'immediate';
                if (timeSince === 'custom') timeSince = document.getElementById('custom-intake-time')?.value || 'custom';
                const notes = document.getElementById('session-notes')?.value || '';
                state.sessionNotes = notes;
                hideModal();
                $('#test-overlay').classList.add('on');
                await runReactionTest();
                await runMemoryTest();
                await runNumberTest();
                await runFocusTest();
                await saveSession(items, timeSince, notes);
                showResults();
            };

            // Test functions (unchanged)
            function runReactionTest() {
                return new Promise(resolve => {
                    $('#test-phase').textContent = 'Test 1/4: Reaction Time';
                    const trials = [];
                    let count = 0;
                    const total = 5;
                    let phase = 'wait';
                    let start;
                    $('#test-area').innerHTML = `
                        <p style="color:var(--text2);margin-bottom:0.3rem;font-size:0.75rem;">Click when screen turns white</p>
                        <div class="react-area" id="react-box">Wait for white...</div>
                        <p style="color:var(--text2);margin-top:0.3rem;font-size:0.65rem;">Trial: <span id="trial-num">1</span>/${total}</p>
                        <div class="prog"><div class="prog-fill" style="width:0%"></div></div>`;
                    const box = $('#react-box');

                    function startTrial() {
                        box.className = 'react-area';
                        box.textContent = 'Wait for white...';
                        const delay = 800 + Math.random() * 2000;
                        setTimeout(() => {
                            if (phase !== 'testing') return;
                            box.classList.add('go');
                            box.textContent = 'NOW!';
                            start = Date.now();
                        }, delay);
                    }
                    box.addEventListener('click', () => {
                        if (phase !== 'testing') return;
                        if (box.classList.contains('go')) {
                            const rt = Date.now() - start;
                            trials.push(rt);
                            count++;
                            box.className = 'react-area';
                            box.style.background = 'var(--grey)';
                            box.style.borderColor = 'var(--text2)';
                            box.textContent = `${rt}ms`;
                            $('#trial-num').textContent = count;
                            $('.prog-fill').style.width = `${(count/total)*100}%`;
                            if (count >= total) {
                                state.testResults.reaction = { avg: Math.round(trials.reduce((a, b) => a + b, 0) /
                                        trials.length), best: Math.min(...trials), consistency: Math
                                        .round((1 - (Math.max(...trials) - Math.min(...trials)) / (trials
                                            .reduce((a, b) => a + b, 0) / trials.length)) * 100) };
                                $('#test-phase').textContent = '✓ Reaction test done!';
                                setTimeout(resolve, 300);
                            } else { setTimeout(startTrial, 300); }
                        } else if (!box.classList.contains('go') && box.style.background !== 'var(--grey)') {
                            box.textContent = 'Too early!';
                            setTimeout(startTrial, 500);
                        }
                    });
                    phase = 'testing';
                    startTrial();
                });
            }

            function runMemoryTest() {
                return new Promise(resolve => {
                    $('#test-phase').textContent = 'Test 2/4: Memory Grid';
                    const size = 4;
                    const len = 6;
                    const pattern = new Set();
                    while (pattern.size < len) pattern.add(Math.floor(Math.random() * (size * size)));
                    $('#test-area').innerHTML = `
                        <p id="mem-msg" style="color:var(--text2);margin-bottom:0.3rem;font-size:0.75rem;">Memorize (2 sec)</p>
                        <div class="mem-grid" style="grid-template-columns:repeat(${size},36px);" id="mem-grid">
                            ${Array.from({length:size*size}, (_,i) => `<div class="mem-cell ${pattern.has(i)?'on':''}" data-idx="${i}"></div>`).join('')}
                        </div>
                        <p style="color:var(--text2);margin-top:0.3rem;font-size:0.65rem;">Found: <span id="mem-found">0</span>/${len}</p>
                        <div class="prog"><div class="prog-fill" style="width:0%"></div></div>`;
                    let correct = 0,
                        wrong = 0,
                        phase = 'memorize';
                    setTimeout(() => {
                        phase = 'recall';
                        $('#mem-msg').textContent = 'Click the tiles you remember';
                        $$('#mem-grid .mem-cell').forEach(c => c.classList.remove('on'));
                    }, 1800);
                    $('#mem-grid').addEventListener('click', (e) => {
                        if (phase !== 'recall') return;
                        const cell = e.target.closest('.mem-cell');
                        if (!cell) return;
                        const idx = parseInt(cell.dataset.idx);
                        if (pattern.has(idx) && !cell.classList.contains('ok')) {
                            cell.classList.add('ok');
                            correct++;
                            $('#mem-found').textContent = correct;
                            $('.prog-fill').style.width = `${(correct/len)*100}%`;
                            if (correct >= len) {
                                state.testResults.memory = { score: Math.min(Math.round((correct / (correct +
                                        wrong)) * 20), 20), correct, mistakes: wrong };
                                $('#test-phase').textContent = '✓ Memory test done!';
                                setTimeout(resolve, 300);
                            }
                        } else if (!cell.classList.contains('ok')) {
                            cell.classList.add('bad');
                            wrong++;
                            setTimeout(() => cell.classList.remove('bad'), 200);
                        }
                    });
                });
            }

            function runNumberTest() {
                return new Promise(resolve => {
                    $('#test-phase').textContent = 'Test 3/4: Number Recall';
                    let span = 4;

                    function showNumber() {
                        const num = Array.from({ length: span }, () => Math.floor(Math.random() * 10)).join('');
                        $('#test-area').innerHTML = `
                            <p style="color:var(--text2);margin-bottom:0.3rem;font-size:0.75rem;">Remember this number</p>
                            <div class="num-big">${num}</div>
                            <p style="color:var(--text2);font-size:0.65rem;">Digit Span: ${span}</p>`;
                        setTimeout(() => {
                            $('#test-area').innerHTML = `
                                <p style="color:var(--text2);margin-bottom:0.3rem;font-size:0.75rem;">Enter the number</p>
                                <input type="text" class="num-inp" id="num-inp" maxlength="${span}" autofocus>
                                <p style="color:var(--text2);margin-top:0.3rem;font-size:0.65rem;">Digit Span: ${span}</p>
                                <button class="btn" id="num-submit" style="margin-top:0.3rem;">Submit</button>`;
                            $('#num-submit').addEventListener('click', () => checkNumber(num));
                            $('#num-inp').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkNumber(
                                num); });
                            setTimeout(() => $('#num-inp')?.focus(), 100);
                        }, 1500);
                    }

                    function checkNumber(correct) {
                        const input = $('#num-inp')?.value;
                        if (input === correct && span < 10) { span++;
                            alert('Correct! +1 span', 's');
                            showNumber(); } else { state.testResults.number = { span: input === correct ? span :
                                    span - 1 };
                            $('#test-phase').textContent = '✓ Number recall done!';
                            resolve(); }
                    }
                    showNumber();
                });
            }

            function runFocusTest() {
                return new Promise(resolve => {
                    $('#test-phase').textContent = 'Test 4/4: Shape Focus';
                    const shapes = ['●', '■', '▲', '◆'];
                    const target = shapes[Math.floor(Math.random() * shapes.length)];
                    let correct = 0,
                        wrong = 0,
                        round = 0;
                    const total = 10;

                    function makeGrid() {
                        const cells = [];
                        const tpos = Math.floor(Math.random() * 9);
                        for (let i = 0; i < 9; i++) {
                            if (i === tpos) cells.push(target);
                            else { let s; do { s = shapes[Math.floor(Math.random() * shapes.length)]; } while (s ===
                                    target);
                                cells.push(s); }
                        }
                        $('#test-area').innerHTML = `
                            <p style="color:var(--text2);margin-bottom:0.3rem;font-size:0.75rem;">Tap only: <span style="font-size:1.1rem;">${target}</span></p>
                            <div class="shape-grid">${cells.map(s => `<div class="shape-cell" data-shape="${s}">${s}</div>`).join('')}</div>
                            <p style="color:var(--text2);margin-top:0.3rem;font-size:0.65rem;">Round: <span id="focus-round">${round+1}</span>/${total}</p>
                            <div class="prog"><div class="prog-fill" style="width:${(round/total)*100}%"></div></div>`;
                        $$('.shape-cell').forEach(c => {
                            c.addEventListener('click', () => {
                                if (c.dataset.shape === target) {
                                    c.classList.add('good');
                                    correct++;
                                    round++;
                                    $('#focus-round').textContent = Math.min(round + 1, total);
                                    $('.prog-fill').style.width = `${(round/total)*100}%`;
                                    if (round >= total) {
                                        state.testResults.focus = { accuracy: Math.round((correct / (
                                            correct + wrong)) * 100), correct, incorrect: wrong };
                                        $('#test-phase').textContent = '✓ Focus test done!';
                                        resolve();
                                    } else { setTimeout(makeGrid, 200); }
                                } else {
                                    c.classList.add('bad');
                                    wrong++;
                                    setTimeout(() => c.classList.remove('bad'), 250);
                                }
                            });
                        });
                    }
                    makeGrid();
                });
            }

            function calcOverall() {
                const r = state.testResults.reaction ? Math.max(0, Math.min(100, (300 - state.testResults.reaction
                .avg) / 2)) : 0;
                const m = state.testResults.memory ? (state.testResults.memory.score / 20) * 100 : 0;
                const n = state.testResults.number ? (state.testResults.number.span / 10) * 100 : 0;
                const f = state.testResults.focus?.accuracy || 0;
                return Math.round((r + m + n + f) / 4);
            }

            async function saveSession(items, timeSince, notes) {
                const session = {
                    ...state.sessionMeta,
                    items: items,
                    timeSince: timeSince,
                    notes: notes || state.sessionNotes || '',
                    voiceNote: state.sessionVoiceNote || '',
                    photo: state.sessionPhoto || null,
                    tags: [...state.sessionTags],
                    date: new Date().toISOString(),
                    reaction_avg: state.testResults.reaction?.avg,
                    reaction_best: state.testResults.reaction?.best,
                    reaction_consistency: state.testResults.reaction?.consistency,
                    memory_score: state.testResults.memory?.score,
                    number_span: state.testResults.number?.span,
                    focus_score: state.testResults.focus?.accuracy,
                    overall_score: calcOverall(),
                    item_names: items.map(i => i.name).join(' + '),
                    item_ids: items.map(i => i.id)
                };
                await dbAdd('sessions', session);
            }

            function showResults() {
                $('#test-overlay').classList.remove('on');
                const m = state.sessionMeta,
                    r = state.testResults;
                const overall = calcOverall();
                // AI summary
                let summary = `Today's performance was ${overall > 70 ? 'excellent' : overall > 50 ? 'average' : 'below average'}. `;
                if (r.reaction) summary += `Reaction: ${r.reaction.avg < 250 ? 'Excellent' : r.reaction.avg < 350 ? 'Average' : 'Needs improvement'}. `;
                if (r.memory) summary += `Memory: ${r.memory.score > 15 ? 'Excellent' : r.memory.score > 10 ? 'Average' : 'Needs improvement'}. `;
                if (state.sessionTags.length) summary += `Factors: ${state.sessionTags.join(', ')}.`;

                showModal(`
                    <h2>⬡ Session Complete!</h2>
                    <div style="margin:0.4rem 0;padding:0.4rem;background:var(--bg3);border-radius:8px;font-size:0.75rem;">
                        <h3>${esc(m.items.map(i=>i.name).join(' + '))}</h3>
                        ${timeSince ? `<p><strong>Time:</strong> ${timeSince}</p>` : ''}
                        ${state.sessionTags.length ? `<p><strong>Tags:</strong> ${state.sessionTags.join(', ')}</p>` : ''}
                        ${notes ? `<p><strong>Notes:</strong> ${esc(notes)}</p>` : ''}
                        ${state.sessionVoiceNote ? `<p><strong>Voice Note:</strong> 🎤 ${esc(state.sessionVoiceNote)}</p>` : ''}
                        ${state.sessionPhoto ? `<p><strong>Photo:</strong> <img src="${state.sessionPhoto}" style="max-width:80px;max-height:80px;border-radius:6px;border:1px solid var(--grey);"></p>` : ''}
                    </div>
                    <div class="grid2">
                        <div class="stat"><div class="stat-val" style="font-size:1.1rem;">${r.reaction?.avg||'--'}ms</div><div class="stat-lbl">Reaction</div></div>
                        <div class="stat"><div class="stat-val" style="font-size:1.1rem;">${r.memory?.score||'--'}/20</div><div class="stat-lbl">Memory</div></div>
                        <div class="stat"><div class="stat-val" style="font-size:1.1rem;">${r.number?.span||'--'}</div><div class="stat-lbl">Digit Span</div></div>
                        <div class="stat"><div class="stat-val" style="font-size:1.1rem;">${r.focus?.accuracy||'--'}%</div><div class="stat-lbl">Focus</div></div>
                    </div>
                    <div style="text-align:center;margin:0.6rem 0;padding:0.6rem;background:var(--bg3);border:1px solid var(--grey);border-radius:10px;">
                        <div style="font-size:1.8rem;font-weight:700;">${overall}/100</div>
                        <div style="color:var(--text2);">Overall Score</div>
                        <div style="color:var(--text2);font-size:0.65rem;margin-top:0.2rem;">${summary}</div>
                    </div>
                    <div style="display:flex;gap:0.3rem;justify-content:center;flex-wrap:wrap;">
                        <button class="btn" onclick="startSession()">▶ New Session</button>
                        <button class="btn btn-o" onclick="hideModal();renderDashboard();">Done</button>
                    </div>`);
                // update theme after session
                updateTheme();
            }

            // ============================================================
            //  ANALYTICS (with AI Insights)
            // ============================================================
            function generateInsights(sessions) {
                if (sessions.length === 0) {
                    return { insights: [], comparisons: [], predictions: [], conditions: [], experiments: [] };
                }
                const insights = [];
                const comparisons = [];
                let predictions = [];
                let conditions = [];
                const tagMap = {};
                const allTags = new Set();
                sessions.forEach(s => {
                    (s.tags || []).forEach(t => {
                        allTags.add(t);
                        if (!tagMap[t]) tagMap[t] = [];
                        tagMap[t].push(s);
                    });
                });

                allTags.forEach(tag => {
                    const withTag = tagMap[tag] || [];
                    const withoutTag = sessions.filter(s => !(s.tags || []).includes(tag));
                    if (withTag.length < 2 || withoutTag.length < 2) return;
                    const avgWith = withTag.reduce((a, b) => a + (b.overall_score || 0), 0) / withTag.length;
                    const avgWithout = withoutTag.reduce((a, b) => a + (b.overall_score || 0), 0) / withoutTag.length;
                    const diff = avgWith - avgWithout;
                    const evidence = withTag.length + withoutTag.length;
                    const memWith = withTag.reduce((a, b) => a + (b.memory_score || 0), 0) / withTag.length;
                    const memWithout = withoutTag.reduce((a, b) => a + (b.memory_score || 0), 0) / withoutTag.length;
                    const reactWith = withTag.reduce((a, b) => a + (b.reaction_avg || 0), 0) / withTag.length;
                    const reactWithout = withoutTag.reduce((a, b) => a + (b.reaction_avg || 0), 0) / withoutTag.length;
                    const focusWith = withTag.reduce((a, b) => a + (b.focus_score || 0), 0) / withTag.length;
                    const focusWithout = withoutTag.reduce((a, b) => a + (b.focus_score || 0), 0) / withoutTag.length;
                    const memDiff = memWith - memWithout;
                    const reactDiff = reactWith - reactWithout;
                    const focusDiff = focusWith - focusWithout;

                    let statement = '';
                    const direction = diff > 0 ? 'higher' : 'lower';
                    const magnitude = Math.abs(diff);
                    if (magnitude > 2) {
                        statement =
                            `Sessions tagged with "${tag}" are associated with ${direction} overall scores (${diff > 0 ? '+' : ''}${magnitude.toFixed(1)} points)`;
                    } else {
                        statement =
                            `"${tag}" shows minimal impact on overall score (${diff > 0 ? '+' : ''}${magnitude.toFixed(1)} points)`;
                    }
                    const comp = {
                        tag,
                        sessionsWith: withTag.length,
                        sessionsWithout: withoutTag.length,
                        avgWith: Math.round(avgWith),
                        avgWithout: Math.round(avgWithout),
                        diff: Math.round(diff),
                        memDiff: Math.round(memDiff),
                        reactDiff: Math.round(reactDiff),
                        focusDiff: Math.round(focusDiff),
                        evidence: evidence,
                        statement: statement,
                    };
                    comparisons.push(comp);

                    let aiStatement = '';
                    const conf = evidence > 20 ? 'high' : evidence > 10 ? 'medium' : 'low';
                    const confLabel = conf === 'high' ? 'Strong' : conf === 'medium' ? 'Moderate' : 'Limited';
                    if (Math.abs(diff) > 3) {
                        const area = Math.abs(memDiff) > Math.abs(focusDiff) ? 'memory' : Math.abs(focusDiff) > Math
                            .abs(reactDiff) ? 'focus' : 'reaction';
                        aiStatement =
                            `"${tag}" is associated with ${diff > 0 ? 'higher' : 'lower'} scores (${Math.abs(diff).toFixed(0)} points). ${area} shows the strongest difference. Evidence: ${confLabel} (${evidence} sessions).`;
                    } else {
                        aiStatement =
                            `"${tag}" shows no significant correlation with performance (${Math.abs(diff).toFixed(0)} point difference). Evidence: ${confLabel} (${evidence} sessions).`;
                    }
                    insights.push({ tag, statement: aiStatement, evidence, confidence: conf, diff: diff, sessions: withTag
                            .length });
                });

                // Time analysis
                const timeMap = {};
                sessions.forEach(s => {
                    const d = new Date(s.date);
                    const hour = d.getHours();
                    const period = hour >= 6 && hour < 12 ? 'Morning' : hour >= 12 && hour < 17 ? 'Afternoon' :
                        hour >= 17 && hour < 21 ? 'Evening' : 'Night';
                    if (!timeMap[period]) timeMap[period] = [];
                    timeMap[period].push(s);
                });
                let bestTime = 'No data';
                let bestScore = 0;
                Object.entries(timeMap).forEach(([period, sess]) => {
                    const avg = sess.reduce((a, b) => a + (b.overall_score || 0), 0) / sess.length;
                    if (avg > bestScore && sess.length > 1) { bestScore = avg;
                        bestTime = period; }
                });
                if (bestTime !== 'No data') {
                    insights.push({
                        tag: `⏰ Best Time: ${bestTime}`,
                        statement: `Your highest scores occur during the ${bestTime} (${Math.round(bestScore)} avg).`,
                        evidence: Object.values(timeMap).reduce((a, b) => a + b.length, 0),
                        confidence: 'medium',
                        diff: 0,
                        sessions: Object.values(timeMap).reduce((a, b) => a + b.length, 0),
                    });
                }

                // Predictions
                if (sessions.length >= 3) {
                    const avgOverall = sessions.reduce((a, b) => a + (b.overall_score || 0), 0) / sessions.length;
                    let predicted = Math.round(avgOverall);
                    const hasCaffeine = sessions.some(s => (s.tags || []).some(t => t.includes('Caffeine') || t.includes(
                        '☕')));
                    const hasSleep = sessions.some(s => (s.tags || []).some(t => t.includes('Sleep') || t.includes('😴')));
                    const hasStress = sessions.some(s => (s.tags || []).some(t => t.includes('Stress') || t.includes(
                    '😰')));
                    if (hasCaffeine) predicted += 3;
                    if (hasSleep) predicted += 4;
                    if (hasStress) predicted -= 5;
                    predicted = Math.max(0, Math.min(100, predicted));
                    predictions.push({
                        score: predicted,
                        note: `Expected focus score: ${predicted}%`,
                        factors: `Based on ${hasCaffeine ? 'caffeine' : 'no caffeine'}, ${hasSleep ? 'good sleep' : 'sleep unknown'}, ${hasStress ? 'stress present' : 'low stress'}`,
                    });

                    const tagScores = {};
                    allTags.forEach(tag => {
                        const withTag = tagMap[tag] || [];
                        if (withTag.length < 2) return;
                        const avg = withTag.reduce((a, b) => a + (b.overall_score || 0), 0) / withTag.length;
                        tagScores[tag] = Math.round(avg);
                    });
                    const sorted = Object.entries(tagScores).sort((a, b) => b[1] - a[1]);
                    if (sorted.length >= 2) {
                        conditions = sorted.slice(0, 3).map(([tag, score]) => ({ tag, score,
                            detail: `${tag} → Avg Score: ${score}` }));
                    }
                }

                // Suggested experiments
                const suggestedExps = [];
                const hasCaffeineTag = sessions.some(s => (s.tags || []).some(t => t.includes('Caffeine') || t.includes(
                    '☕')));
                const hasSleepTag = sessions.some(s => (s.tags || []).some(t => t.includes('Sleep') || t.includes('😴')));
                if (!hasCaffeineTag && sessions.length > 2) {
                    suggestedExps.push({
                        name: 'Caffeine Effect',
                        variable: 'Caffeine',
                        description: 'Test caffeine\'s effect on reaction speed. Complete 7 sessions with caffeine and 7 without.',
                        target: 14,
                    });
                }
                if (!hasSleepTag && sessions.length > 2) {
                    suggestedExps.push({
                        name: 'Sleep Impact',
                        variable: 'Sleep',
                        description: 'Track sleep duration (6h vs 8h+) to measure impact on memory and focus.',
                        target: 20,
                    });
                }
                return { insights, comparisons, predictions, conditions, experiments: suggestedExps };
            }

            async function renderAnalytics() {
                const sessions = await dbAll('sessions');
                const items = await dbAll('items');
                const goals = await dbAll('goals');
                const experiments = await dbAll('experiments');
                const { insights, comparisons, predictions, conditions, experiments: suggestedExps } = generateInsights(

                $('#main-content').innerHTML = `
                    <h2 style="margin-bottom:0.5rem;">Analytics</h2>
                    <div class="analytics-subnav">
                        <button class="btn ${state.analyticsSub === 'insights' ? 'active' : ''}" onclick="switchAnalytics('insights')">🧠 AI Insights</button>
                        <button class="btn ${state.analyticsSub === 'stats' ? 'active' : ''}" onclick="switchAnalytics('stats')">📊 Stats</button>
                        <button class="btn ${state.analyticsSub === 'graphs' ? 'active' : ''}" onclick="switchAnalytics('graphs')">📈 Graphs</button>
                        <button class="btn ${state.analyticsSub === 'profile' ? 'active' : ''}" onclick="switchAnalytics('profile')">🧠 Profile</button>
                        <button class="btn ${state.analyticsSub === 'compare' ? 'active' : ''}" onclick="switchAnalytics('compare')">⚖️ Compare</button>
                        <button class="btn ${state.analyticsSub === 'goals' ? 'active' : ''}" onclick="switchAnalytics('goals')">🎯 Goals</button>
                        <button class="btn ${state.analyticsSub === 'experiments' ? 'active' : ''}" onclick="switchAnalytics('experiments')">🧪 Experiments</button>
                    </div>
                    <div id="analytics-content">
                        ${state.analyticsSub === 'insights' ? renderInsightsTab(sessions, insights, comparisons, predictions, conditions, suggestedExps) :
                          state.analyticsSub === 'stats' ? renderStatsTab(sessions, items) :

            function switchAnalytics(sub) {
                state.analyticsSub = sub;
                renderAnalytics();
            }

            function renderInsightsTab(sessions, insights, comparisons, predictions, conditions, suggestedExps) {
                if (sessions.length === 0) {
                    return `<div class="card"><p style="color:var(--text2);">Complete at least 3 sessions to generate AI insights.</p></div>`;

                html += `<div class="card"><h3>🧠 AI Generated Insights</h3>`;

                } else {
                    insights.forEach(ins => {
                        const conf = ins.confidence === 'high' ? 'conf-high' : ins.confidence === 'medium' ?
                            'conf-medium' : 'conf-low';
                        const confLabel = ins.confidence === 'high' ? 'Strong' : ins.confidence === 'medium' ?
                            'Moderate' : 'Limited';
                        html += `
                            <div class="insight-card">
                                <div style="font-weight:600;">${esc(ins.tag)}</div>
                                <div style="font-size:0.75rem;margin:0.15rem 0;">${esc(ins.statement)}</div>
                                <div class="evidence">
                                    Evidence: <span class="conf-badge ${conf}">${confLabel}</span> (${ins.evidence} sessions)
                                    ${ins.sessions ? ` • ${ins.sessions} sessions` : ''}
                                </div>
                            </div>

                html += `</div>`;

                html += `<div class="card"><h3>📊 Comparison Cards</h3>`;
                if (comparisons.length === 0) {
                    html += `<p style="color:var(--text2);">Complete more sessions with varied tags.</p>`;
                } else {
                    comparisons.slice(0, 4).forEach(c => {
                        const diffColor = c.diff > 0 ? 'var(--green)' : c.diff < 0 ? 'var(--red)' :
                            'var(--text2)';
                        html += `
                            <div style="background:var(--bg3);border-radius:8px;padding:0.4rem;margin:0.2rem 0;border-left:3px solid ${diffColor};">
                                <div style="display:flex;justify-content:space-between;flex-wrap:wrap;font-size:0.7rem;">
                                    <span><strong>${esc(c.tag)}</strong></span>
                                    <span style="color:var(--text2);">${c.evidence} sessions</span>
                                </div>
                                <div style="display:flex;justify-content:space-between;flex-wrap:wrap;font-size:0.65rem;margin-top:0.15rem;">
                                    <span>With: ${c.avgWith}</span>
                                    <span>Without: ${c.avgWithout}</span>
                                    <span class="diff" style="color:${diffColor};">${c.diff > 0 ? '+' : ''}${c.diff} pts</span>
                                </div>
                                ${c.memDiff || c.reactDiff || c.focusDiff ? `
                                    <div style="display:flex;gap:0.3rem;flex-wrap:wrap;font-size:0.6rem;color:var(--text2);margin-top:0.1rem;">
                                        ${c.memDiff ? `<span>Memory: ${c.memDiff > 0 ? '+' : ''}${c.memDiff}</span>` : ''}
                                        ${c.reactDiff ? `<span>Reaction: ${c.reactDiff < 0 ? '' : '+'}${c.reactDiff}ms</span>` : ''}
                                        ${c.focusDiff ? `<span>Focus: ${c.focusDiff > 0 ? '+' : ''}${c.focusDiff}%</span>` : ''}
                                    </div>

                html += `</div>`;

                html += `<div class="card"><h3>🔮 Predictions</h3>`;
                if (predictions.length === 0) {
                    html += `<p style="color:var(--text2);">Need more sessions for predictions.</p>`;
                } else {
                    predictions.forEach(p => {
                        html += `
                            <div class="prediction-box">
                                <div class="score">${p.score}%</div>
                                <div style="font-size:0.7rem;">${esc(p.note)}</div>
                                <div style="font-size:0.6rem;color:var(--text2);margin-top:0.15rem;">${esc(p.factors)}</div>
                            </div>
                        `;

                }
                html += `</div>`;

                html += `<div class="card"><h3>🏆 Performance Conditions</h3>`;
                if (conditions.length === 0) {
                    html += `<p style="color:var(--text2);">Need more data for ranking.</p>`;
                } else {
                    conditions.forEach((c, i) => {
                        const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉';
                        html += `
                            <div class="comparison-row">
                                <span>${medal} ${esc(c.tag)}</span>
                                <span style="font-weight:600;">Avg Score: ${c.score}</span>
                            </div>
                        `;
                    });
                }
                html += `</div>`;

                html += `<div class="card"><h3>🧪 Suggested Experiments</h3>`;
                if (suggestedExps.length === 0) {
                    html += `<p style="color:var(--text2);">No experiments suggested yet. Keep testing!</p>`;
                } else {
                    suggestedExps.forEach(e => {
                        html += `
                            <div style="background:var(--bg3);border-radius:8px;padding:0.4rem;margin:0.2rem 0;border-left:3px solid var(--blue);">
                                <div style="font-weight:600;font-size:0.8rem;">${esc(e.name)}</div>
                                <div style="font-size:0.65rem;color:var(--text2);">${esc(e.description)}</div>
                                <div style="font-size:0.55rem;color:var(--text2);margin-top:0.1rem;">Target: ${e.target} sessions</div>

            // Stats, Graphs, Profile, Compare, Goals, Experiments (abbreviated)
            function renderStatsTab(sessions, items) {
                const compNames = new Set();
                items.forEach(item => { (item.components || []).forEach(c => compNames.add(c.name)); });
                let compOptions = '<option value="">Select...</option>';
                compNames.forEach(n => { compOptions += `<option value="${esc(n)}">${esc(n)}</option>`; });
                return `
                    <div class="card">
                        <h3>Component Statistics</h3>
                        <div style="display:flex;gap:0.3rem;margin:0.3rem 0;flex-wrap:wrap;">
                            <select class="f-input" id="stats-comp-select" onchange="updateStats()" style="flex:2;min-width:90px;">${compOptions}</select>
                            <select class="f-input" id="stats-metric-select" onchange="updateStats()" style="flex:1;min-width:60px;">
                                <option value="overall_score">Overall</option>
                                <option value="reaction_avg">Reaction</option>
                                <option value="memory_score">Memory</option>
                                <option value="focus_score">Focus</option>
                            </select>
                        </div>
                        <div id="stats-detail"><p style="color:var(--text2);">Select a component</p></div>
                    </div>`;
            }

            window.updateStats = function() {
                const comp = document.getElementById('stats-comp-select')?.value;
                if (!comp) return;
                document.getElementById('stats-detail').innerHTML =
                    `<p style="color:var(--text2);">Analyzing: ${esc(comp)}. Check AI Insights for full analysis.</p>`;
            };

            function renderGraphsTab(sessions) {
                const hasData = sessions.length > 0;
                return `
                    <div class="card"><h3>Performance Timeline</h3><div id="timeline-graph">${hasData ? drawTimeline(sessions) : '<p style="color:var(--text2);">Complete tests to generate graphs.</p>'}</div></div>
                    <div class="grid2">
                        <div class="card"><h3>Correlation</h3><div id="correlation-graph">${hasData ? drawCorrelation(sessions) : '<p style="color:var(--text2);">Need 1+ session</p>'}</div></div>
                        <div class="card"><h3>Trend</h3><div id="trend-detection">${sessions.length >= 2 ? drawTrend(sessions) : '<p style="color:var(--text2);">Need 2+ sessions</p>'}</div></div>
                    </div>
                    <div class="card"><h3>Heatmap</h3><div id="heatmap">${hasData ? drawHeatmap(sessions) : '<p style="color:var(--text2);">No data</p>'}</div></div>
                `;
            }

            function drawTimeline(sessions) {
                const sorted = sessions.sort((a, b) => new Date(a.date) - new Date(b.date));
                const data = sorted.slice(-14).map(s => ({ date: new Date(s.date).toLocaleDateString(), score: s
                        .overall_score || 0 }));
                const w = 420,
                    h = 130,
                    pad = 18;
                if (data.length === 0) return '<p style="color:var(--text2);">No data</p>';
                const max = Math.max(...data.map(d => d.score), 50);
                const min = Math.min(...data.map(d => d.score), 0);
                const range = max - min || 1;
                const pts = data.map((d, i) => ({
                    x: pad + (i / (data.length - 1 || 1)) * (w - 2 * pad),
                    y: h - pad - ((d.score - min) / range) * (h - 2 * pad),
                    label: d.date,
                    val: d.score
                }));
                const path = pts.map((p, i) => `${i===0?'M':'L'} ${p.x} ${p.y}`).join(' ');
                return `<div class="graph-box"><svg viewBox="0 0 ${w} ${h}"><line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="#333" stroke-width="1"/><line x1="${pad}" y1="${pad}" x2="${pad}" y2="${h-pad}" stroke="#333" stroke-width="1"/><path d="${path}" fill="none" stroke="#fff" stroke-width="2"/>${pts.map(p => `<circle cx="${p.x}" cy="${p.y}" r="2.5" fill="#fff"><title>${p.label}: ${p.val}</title></circle>`).join('')}<text x="${w/2}" y="${h-4}" fill="#666" font-size="7" text-anchor="middle">Recent sessions</text></svg></div>`;
            }

            function drawCorrelation(sessions) {
                const data = sessions.filter(s => s.overall_score != null && s.reaction_avg != null);
                if (data.length === 0) return '<p style="color:var(--text2);">Not enough data</p>';
                const w = 420,
                    h = 130,
                    pad = 18;
                const maxScore = Math.max(...data.map(d => d.overall_score), 50);
                const minScore = Math.min(...data.map(d => d.overall_score), 0);
                const maxReaction = Math.max(...data.map(d => d.reaction_avg), 200);
                const minReaction = Math.min(...data.map(d => d.reaction_avg), 100);
                const rangeS = maxScore - minScore || 1;
                const rangeR = maxReaction - minReaction || 1;
                const pts = data.map(d => ({
                    x: pad + ((d.overall_score - minScore) / rangeS) * (w - 2 * pad),
                    y: h - pad - ((d.reaction_avg - minReaction) / rangeR) * (h - 2 * pad)
                }));
                const dots = pts.map(p => `<circle cx="${p.x}" cy="${p.y}" r="2.5" fill="#4a4"/>`).join('');
                return `<div class="graph-box"><svg viewBox="0 0 ${w} ${h}"><line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="#333" stroke-width="1"/><line x1="${pad}" y1="${pad}" x2="${pad}" y2="${h-pad}" stroke="#333" stroke-width="1"/>${dots}<text x="${w/2}" y="${h-4}" fill="#666" font-size="7" text-anchor="middle">Score vs Reaction</text></svg></div>`;
            }

            function drawTrend(sessions) {
                const sorted = sessions.sort((a, b) => new Date(a.date) - new Date(b.date));
                const vals = sorted.map(s => s.overall_score || 0);
                const mid = Math.floor(vals.length / 2);
                const first = vals.slice(0, mid).reduce((a, b) => a + b, 0) / mid;
                const second = vals.slice(mid).reduce((a, b) => a + b, 0) / (vals.length - mid);
                const pct = ((second - first) / first) * 100;
                const better = pct > 0;
                return `<div style="padding:0.3rem;"><p style="font-size:1rem;">${better ? '📈 Improving' : '📉 Declining'}</p><p style="color:var(--text2);">${pct > 0 ? '+' : ''}${pct.toFixed(1)}% over ${vals.length} sessions</p></div>`;
            }

            function drawHeatmap(sessions) {
                const now = new Date();
                const weekAgo = new Date(now);
                weekAgo.setDate(weekAgo.getDate() - 6);
                const days = [];
                for (let d = new Date(weekAgo); d <= now; d.setDate(d.getDate() + 1)) {
                    const dateStr = d.toDateString();
                    const s = sessions.find(ses => new Date(ses.date).toDateString() === dateStr);
                    const score = s?.overall_score || 0;
                    let cls = 'none';
                    if (score >= 80) cls = 'high';
                    else if (score >= 50) cls = 'medium';
                    else if (score > 0) cls = 'low';
                    days.push({ date: d.toLocaleDateString(), cls, score });
                }
                return `<div class="heatmap-grid">${days.map(d => `<div class="heatmap-cell ${d.cls}" title="${d.date}: ${d.score}">${d.cls === 'high' ? '🟩' : d.cls === 'medium' ? '🟨' : d.cls === 'low' ? '🟥' : '⬛'}</div>`).join('')}</div>
                        <p style="color:var(--text2);font-size:0.55rem;">🟩 High • 🟨 Avg • 🟥 Low • ⬛ No test</p>`;
            }

            function renderProfileTab(sessions) {
                if (sessions.length === 0) return `<div class="card"><p style="color:var(--text2);">Complete tests to build your profile.</p></div>`;
                const avgFocus = Math.round(sessions.reduce((a, b) => a + (b.focus_score || 0), 0) / sessions.length);
                const avgMemory = Math.round(sessions.reduce((a, b) => a + (b.memory_score || 0), 0) / sessions.length);
                const avgReaction = Math.round(sessions.reduce((a, b) => a + (b.reaction_avg || 0), 0) / sessions.length);
                const avgOverall = Math.round(sessions.reduce((a, b) => a + (b.overall_score || 0), 0) / sessions.length);
                const problemSolving = Math.min(100, Math.round((avgMemory + avgFocus) / 2));
                const stats = [
                    { label: 'Focus', val: avgFocus, max: 100 },
                    { label: 'Memory', val: avgMemory, max: 20 },
                    { label: 'Reaction', val: Math.max(0, 100 - Math.round(avgReaction / 3)), max: 100,
                    labelSuffix: 'ms' },
                    { label: 'Problem Solving', val: problemSolving, max: 100 },
                ];
                return `<div class="card"><h3>🧠 Personal Performance Profile</h3>${stats.map(s => `<div class="profile-stat"><span class="label">${s.label}</span><div class="bar"><div class="bar-fill" style="width:${Math.min(100, (s.val/s.max)*100)}%;background:${s.val > s.max/2 ? 'var(--green)' : 'var(--yellow)'};"></div></div><span class="value">${s.val}${s.labelSuffix||''}</span></div>`).join('')}<div style="margin-top:0.3rem;padding:0.3rem;background:var(--bg3);border-radius:6px;"><p style="color:var(--text2);font-size:0.65rem;">Based on ${sessions.length} sessions • Avg Overall: ${avgOverall}/100</p></div></div>`;
            }

            function renderCompareTab(sessions) {
                if (sessions.length < 2) return `<div class="card"><p style="color:var(--text2);">Need at least 2 sessions to compare.</p></div>`;
                const sorted = sessions.sort((a, b) => new Date(a.date) - new Date(b.date));
                const mid = Math.floor(sorted.length / 2);
                const oldS = sorted.slice(0, mid);
                const newS = sorted.slice(mid);
                const oldAvg = Math.round(oldS.reduce((a, b) => a + (b.overall_score || 0), 0) / oldS.length);
                const newAvg = Math.round(newS.reduce((a, b) => a + (b.overall_score || 0), 0) / newS.length);
                const change = ((newAvg - oldAvg) / oldAvg) * 100;
                return `<div class="card"><h3>⚖️ Version Comparison</h3><div class="grid2"><div class="stat"><div class="stat-val" style="font-size:1.3rem;">${oldAvg}</div><div class="stat-lbl">Earlier (${oldS.length} sessions)</div></div><div class="stat"><div class="stat-val" style="font-size:1.3rem;">${newAvg}</div><div class="stat-lbl">Recent (${newS.length} sessions)</div></div></div><div style="text-align:center;padding:0.4rem;background:var(--bg3);border-radius:8px;margin-top:0.3rem;"><span style="font-size:1.1rem;color:${change > 0 ? 'var(--green)' : 'var(--red)'};">${change > 0 ? '📈' : '📉'} ${change > 0 ? '+' : ''}${change.toFixed(1)}%</span><span style="color:var(--text2);margin-left:0.2rem;">change</span></div></div>`;
            }

            function renderGoalsTab(sessions, goals) {
                const current = sessions.length > 0 ? Math.round(sessions.reduce((a, b) => a + (b.overall_score || 0), 0) /
                    sessions.length) : 0;
                let goalHTML = goals.length === 0 ? '<p style="color:var(--text2);">No goals set.</p>' :
                    goals.map(g => {
                        const progress = Math.min(100, Math.round((current / g.target) * 100));
                        return `<div style="margin:0.2rem 0;padding:0.3rem;background:var(--bg3);border-radius:6px;"><div style="display:flex;justify-content:space-between;font-size:0.75rem;"><span><strong>${esc(g.name)}</strong></span><span>${current} → ${g.target}</span></div><div class="goal-bar"><div class="goal-bar-fill" style="width:${progress}%;background:${progress >= 100 ? 'var(--green)' : 'var(--yellow)'};"></div></div><span style="color:var(--text2);font-size:0.55rem;">${progress}% complete</span><button class="btn btn-r btn-s" onclick="deleteGoal(${g.id})" style="float:right;">✕</button></div>`;
                    }).join('');
                return `<div class="card"><h3>🎯 Goals</h3>${goalHTML}<div style="margin-top:0.4rem;"><form onsubmit="addGoal(event)" style="display:flex;gap:0.2rem;flex-wrap:wrap;"><input type="text" class="f-input" id="goal-name" placeholder="Goal name" style="flex:2;min-width:70px;" required><input type="number" class="f-input" id="goal-target" placeholder="Target" style="flex:1;min-width:50px;" required><button type="submit" class="btn btn-s">Add Goal</button></form></div></div>`;
            }

            window.addGoal = async function(e) {
                e.preventDefault();
                const name = document.getElementById('goal-name')?.value;
                const target = parseInt(document.getElementById('goal-target')?.value);
                if (!name || !target) return;
                await dbAdd('goals', { name, target, metric: 'overall_score', created: new Date().toISOString() });
                alert('Goal added!', 's');
                renderAnalytics();
            };
            window.deleteGoal = async function(id) {
                if (confirm('Delete goal?')) { await dbDel('goals', id);
                    renderAnalytics(); }
            };

            function renderExperimentsTab(sessions, experiments) {
                let expHTML = experiments.length === 0 ? '<p style="color:var(--text2);">No experiments yet.</p>' :
                    experiments.map(e => {
                        const relevant = sessions.filter(s => s.item_names?.includes(e.variable));
                        const avg = relevant.length ? Math.round(relevant.reduce((a, b) => a + (b
                            .overall_score || 0), 0) / relevant.length) : 0;
                        return `<div style="margin:0.2rem 0;padding:0.3rem;background:var(--bg3);border-radius:6px;border-left:3px solid var(--text2);"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;font-size:0.75rem;"><span><strong>${esc(e.name)}</strong> (${esc(e.variable)})</span><span style="color:var(--text2);font-size:0.6rem;">${relevant.length} sessions • Avg: ${avg}</span></div><p style="color:var(--text2);font-size:0.6rem;">${esc(e.description||'')}</p><button class="btn btn-r btn-s" onclick="deleteExperiment(${e.id})">✕</button></div>`;
                    }).join('');
                return `<div class="card"><h3>🧪 Experiment Mode</h3>${expHTML}<div style="margin-top:0.4rem;"><form onsubmit="addExperiment(event)" style="display:flex;gap:0.2rem;flex-wrap:wrap;"><input type="text" class="f-input" id="exp-name" placeholder="Experiment name" style="flex:2;min-width:60px;" required><input type="text" class="f-input" id="exp-variable" placeholder="Variable" style="flex:1;min-width:50px;" required><input type="text" class="f-input" id="exp-desc" placeholder="Description" style="flex:2;min-width:60px;"><button type="submit" class="btn btn-s">Create</button></form></div></div>`;
            }

            window.addExperiment = async function(e) {
                e.preventDefault();

            // --- AI Financial Estimation ---
            window.runAIEstimate = function() {
                const name = document.getElementById('ai-item-name')?.value;
                const price = parseFloat(document.getElementById('ai-item-price')?.value);
                if (!name || !price || price <= 0) {
                    document.getElementById('ai-estimate-result').innerHTML =
                        '<p style="color:var(--text2);font-size:0.7rem;">Please enter an item name and price.</p>';
                    return;
                }

                const balance = state.savingsBalance;
                const weeklyIncome = state.incomeData.weeklyPay || 300;
                const monthlyIncome = state.incomeData.monthlyEstimate || 1200;
                const hourly = state.incomeData.hourlyRate || 15;
                const hours = state.incomeData.hoursPerWeek || 20;

                const savingsRate = 0.2;
                const weeklySavings = weeklyIncome * savingsRate;
                const weeksToAfford = Math.max(0, (price - balance) / weeklySavings);
                const weeksToAffordRounded = Math.ceil(weeksToAfford);

                let prediction = '';
                if (balance >= price) {
                    prediction =
                        `✅ You can afford <strong>${esc(name)}</strong> right now! You have $${balance.toFixed(2)} and it costs $${price.toFixed(2)}. After buying, you'd have $${(balance - price).toFixed(2)} left.`;
                } else {
                    const shortfall = (price - balance).toFixed(2);
                    prediction =
                        `📊 You need <strong>$${shortfall}</strong> more to afford <strong>${esc(name)}</strong>. <br>`;
                    prediction +=
                        `💰 With your weekly income of <strong>$${weeklyIncome.toFixed(2)}</strong> ($${hourly.toFixed(2)}/hr × ${hours}hrs), `;
                    prediction += `saving about <strong>$${weeklySavings.toFixed(2)}/week</strong>, `;
                    if (weeksToAffordRounded <= 1) {
                        prediction += `you could afford this in <strong>about 1 week</strong>.`;
                    } else {
                        prediction += `you could afford this in <strong>about ${weeksToAffordRounded} weeks</strong>.`;
                    }
                    prediction +=
                    `<br>After purchase, estimated savings: <strong>$${Math.max(0, balance + (weeksToAffordRounded * weeklySavings) - price).toFixed(2)}</strong>`;
                }

                const monthlySpending = state.financeData.filter(f => f.type === 'spending').reduce((sum, f) => sum + (f
                    .amount || 0), 0) / 4;
                const monthlyNet = monthlyIncome - monthlySpending;
                const affordable = monthlyNet > price / 4 ? '✅ Looks affordable within your monthly budget.' :
                    '⚠️ This may strain your monthly budget.';

                document.getElementById('ai-estimate-result').innerHTML = `
                    <div class="ai-prediction">
                        <div style="font-weight:600;font-size:0.8rem;">🧠 AI Estimate for "${esc(name)}"</div>
                        <div style="margin:0.2rem 0;">${prediction}</div>
                        <div style="font-size:0.7rem;color:var(--text2);margin-top:0.1rem;">${affordable}</div>
                        <div style="font-size:0.6rem;color:var(--text2);margin-top:0.1rem;">
                            💡 Based on $${weeklyIncome.toFixed(2)}/week income, $${monthlyIncome.toFixed(2)}/month, and $${weeklySavings.toFixed(2)}/week savings rate.
                        </div>
                    </div>
                `;
                state.itemTarget = { name, price };
            };

            // ============================================================
            //  🔔 AI NOTIFICATION SYSTEM
            // ============================================================
            function defaultNotifSettings() {
                return { enabled: true, frequency: 'daily', style: 'motivational', trackedGoals: [], lastSent: {}, lastProgress: {} };
            }

            async function loadNotifSettings() {
                const all = await dbAll('finance');
                const rec = all.find(f => f.type === 'notifSettings');
                if (!rec) return { type: 'notifSettings', ...defaultNotifSettings() };
                return { ...defaultNotifSettings(), ...rec };
            }

            async function saveNotifSettings(settings) {
                const all = await dbAll('finance');
                const existing = all.find(f => f.type === 'notifSettings');
                if (existing) {
                    Object.assign(existing, settings);
                    await dbPut('finance', existing);
                } else {
                    await dbAdd('finance', { type: 'notifSettings', ...settings });
                }
            }

            function computeFinancialPrediction(goal) {
                const balance = state.savingsBalance;
                const target = goal.target || 0;
                const remaining = Math.max(0, target - balance);
                const hourly = state.incomeData.hourlyRate || 15;
                const hours = state.incomeData.hoursPerWeek || 20;
                const weeklyIncome = state.incomeData.weeklyPay || (hourly * hours);

                const spendingEntries = state.financeData.filter(f => f.type === 'spending');
                const now = Date.now();
                const fourWeeksAgo = now - 28 * 24 * 60 * 60 * 1000;
                const recentSpending = spendingEntries.filter(f => new Date(f.date).getTime() >= fourWeeksAgo);
                const totalRecentSpending = recentSpending.reduce((s, f) => s + (f.amount || 0), 0);
                const avgWeeklySpending = recentSpending.length ? totalRecentSpending / 4 : 0;

                const weeklySavings = goal.weeklySavings && goal.weeklySavings > 0 ?
                    goal.weeklySavings : Math.max(0, weeklyIncome - avgWeeklySpending) || (weeklyIncome * 0.2);
                const savingsRate = weeklyIncome > 0 ? weeklySavings / weeklyIncome : 0;
                const weeksToGoal = weeklySavings > 0 ? Math.ceil(remaining / weeklySavings) : Infinity;
                const progress = target > 0 ? Math.min(100, Math.round((balance / target) * 100)) : 0;

                return { balance, target, remaining, hourly, hours, weeklyIncome, avgWeeklySpending, weeklySavings,
                    savingsRate, weeksToGoal, progress };
            }

            function buildNotificationMessage(goal, pred, style) {
                let title, body;
                if (pred.progress >= 100) {
                    title = '🎉 Savings goal complete!';
                    body = `You saved enough for "${goal.name}".`;
                } else if (pred.weeksToGoal !== Infinity && pred.weeksToGoal <= 2) {
                    title = "🎯 You're close to your savings goal!";
                    body = `You only have ${pred.weeksToGoal} week${pred.weeksToGoal === 1 ? '' : 's'} left until you can afford "${goal.name}".`;
                } else if (pred.progress >= 75) {
                    title = "🚀 You're 75% of the way there!";
                    body = `Only $${pred.remaining.toFixed(0)} left until you reach "${goal.name}".`;
                } else if (pred.progress >= 50) {
                    title = '🎯 Halfway there!';
                    body = `50% complete! Halfway to your goal of "${goal.name}".`;
                } else if (pred.weeksToGoal !== Infinity && pred.weeksToGoal <= 12) {
                    const months = Math.max(1, Math.round(pred.weeksToGoal / 4));
                    title = "💰 You're making progress!";
                    body = `At your current saving rate, you'll reach "${goal.name}" in about ${months} month${months === 1 ? '' : 's'}.`;
                } else {
                    title = '📉 Your goal timeline changed.';
                    body = pred.weeksToGoal === Infinity ?
                        `Based on your current spending, "${goal.name}" isn't on track yet. Try increasing weekly savings.` :
                        `Based on your spending, you now have ${pred.weeksToGoal} weeks until "${goal.name}" is complete.`;
                }

                if (style === 'detailed') {
                    body += ` (Balance: $${pred.balance.toFixed(2)} · Weekly income: $${pred.weeklyIncome.toFixed(2)} · Weekly savings: $${pred.weeklySavings.toFixed(2)} · Savings rate: ${Math.round(pred.savingsRate * 100)}%)`;
                } else if (style === 'simple') {
                    body = body.split('.')[0] + '.';
                }
                return { title, body };
            }

            function sendNotification(title, body) {
                SFX.play('notify');
                if ('Notification' in window && Notification.permission === 'granted') {
                    try { new Notification(title, { body }); } catch (e) { /* ignore */ }
                }
                alert(`${title} ${body}`, 's');
            }

            function calcSavingsStreak(entries) {
                const dates = [...new Set(entries.filter(f => f.type === 'income' || f.type === 'savings')
                    .map(f => new Date(f.date).toDateString()))]
                    .map(d => new Date(d))
                    .sort((a, b) => b - a);
                if (dates.length === 0) return 0;
                let streak = 1;
                let cur = dates[0];
                for (let i = 1; i < dates.length; i++) {
                    const prev = new Date(cur);
                    prev.setDate(prev.getDate() - 1);
                    if (dates[i].toDateString() === prev.toDateString()) { streak++;
                        cur = dates[i]; } else break;
                }
                return streak;
            }

            async function checkAndSendNotifications(force) {
                const settings = await loadNotifSettings();
                if (!settings.enabled && !force) return;
                const allFinance = state.financeData.length ? state.financeData : await dbAll('finance');
                const goals = allFinance.filter(f => f.type === 'goal');
                const tracked = (settings.trackedGoals && settings.trackedGoals.length) ?
                    goals.filter(g => settings.trackedGoals.includes(g.id)) : goals;
                if (!tracked.length) return;

                const intervalMs = settings.frequency === 'weekly' ? 7 * 24 * 60 * 60 * 1000 :
                    settings.frequency === 'monthly' ? 30 * 24 * 60 * 60 * 1000 : 24 * 60 * 60 * 1000;

                let changed = false;
                for (const g of tracked) {
                    const pred = computeFinancialPrediction(g);
                    const lastProgress = settings.lastProgress?.[g.id] ?? -1;
                    const crossedMilestone = (pred.progress >= 100 && lastProgress < 100) ||
                        (pred.progress >= 75 && lastProgress < 75) ||
                        (pred.progress >= 50 && lastProgress < 50);
                    const lastSent = settings.lastSent?.[g.id] || 0;
                    const dueForRegular = (Date.now() - lastSent) >= intervalMs;

                    if (force || crossedMilestone || dueForRegular) {
                        const { title, body } = buildNotificationMessage(g, pred, settings.style);
                        sendNotification(title, body);
                        settings.lastSent = settings.lastSent || {};
                        settings.lastSent[g.id] = Date.now();
                        changed = true;
                        if (pred.progress >= 100) SFX.play('goal');
                    }
                    settings.lastProgress = settings.lastProgress || {};
                    settings.lastProgress[g.id] = pred.progress;
                    changed = true;
                }
                if (changed) await saveNotifSettings(settings);
            }

            window.requestNotifPermission = async function() {
                if (!('Notification' in window)) { alert('Browser notifications are not supported here.', 'w'); return; }
                const perm = await Notification.requestPermission();
                SFX.play(perm === 'granted' ? 'success' : 'click');
                if (perm === 'granted') alert('Push notifications enabled!', 's');
                else alert('Notification permission was not granted.', 'w');
                renderFinance();
            };

            window.testNotification = async function() {
                const goals = state.savingsGoals.length ? state.savingsGoals : (await dbAll('finance')).filter(f => f
                    .type === 'goal');
                if (!goals.length) { alert('Add a savings goal first to test notifications.', 'w'); return; }
                const settings = await loadNotifSettings();
                const pred = computeFinancialPrediction(goals[0]);
                const { title, body } = buildNotificationMessage(goals[0], pred, settings.style);
                sendNotification(title, body);
            };

            window.updateNotifSettings = async function() {
                const enabled = document.getElementById('notif-enabled')?.checked ?? true;
                const frequency = document.getElementById('notif-frequency')?.value || 'daily';
                const style = document.getElementById('notif-style')?.value || 'motivational';
                const goalChecks = document.querySelectorAll('.notif-goal-check:checked');
                const trackedGoals = Array.from(goalChecks).map(c => parseInt(c.value));
                const settings = await loadNotifSettings();
                settings.enabled = enabled;
                settings.frequency = frequency;
                settings.style = style;
                settings.trackedGoals = trackedGoals;
                await saveNotifSettings(settings);
                SFX.play('success');
                alert('Notification settings saved!', 's');
            };

            async function renderNotifSettingsBox(goalEntries) {
                const box = document.getElementById('notif-settings-box');
                if (!box) return;
                const settings = await loadNotifSettings();
                const perm = ('Notification' in window) ? Notification.permission : 'unsupported';
                const streak = calcSavingsStreak(state.financeData);

                const goalChecks = goalEntries.length === 0 ?
                    '<p style="color:var(--text2);font-size:0.65rem;">Add a savings goal to enable tracked notifications.</p>' :
                    goalEntries.map(g => `
                        <label style="display:flex;align-items:center;gap:0.25rem;font-size:0.65rem;margin:0.1rem 0;cursor:pointer;">
                            <input type="checkbox" class="notif-goal-check" value="${g.id}" ${(!settings.trackedGoals.length || settings.trackedGoals.includes(g.id)) ? 'checked' : ''}>
                            ${esc(g.name)}
                        </label>
                    `).join('');

                box.innerHTML = `
                    <div style="display:flex;gap:1rem;flex-wrap:wrap;font-size:0.65rem;color:var(--text2);margin-bottom:0.3rem;">
                        <span>🔥 Saving streak: <strong style="color:var(--text);">${streak} day${streak===1?'':'s'}</strong></span>
                        <span>Browser push: <strong style="color:${perm === 'granted' ? 'var(--green)' : 'var(--yellow)'};">${perm === 'granted' ? 'Enabled' : perm === 'denied' ? 'Blocked' : 'Not enabled'}</strong></span>
                    </div>
                    <div class="flex-row" style="gap:0.5rem;margin-bottom:0.3rem;">
                        <label style="display:flex;align-items:center;gap:0.25rem;font-size:0.7rem;">
                            <input type="checkbox" id="notif-enabled" ${settings.enabled ? 'checked' : ''}> Enable finance notifications
                        </label>
                    </div>
                    <div class="flex-row" style="gap:0.4rem;">
                        <div style="flex:1;min-width:100px;">
                            <label class="f-label" style="font-size:0.6rem;color:var(--text2);">Frequency</label>
                            <select class="f-input-sm" id="notif-frequency">
                                <option value="daily" ${settings.frequency === 'daily' ? 'selected' : ''}>Daily</option>
                                <option value="weekly" ${settings.frequency === 'weekly' ? 'selected' : ''}>Weekly</option>
                                <option value="monthly" ${settings.frequency === 'monthly' ? 'selected' : ''}>Monthly</option>
                            </select>
                        </div>
                        <div style="flex:1;min-width:100px;">
                            <label class="f-label" style="font-size:0.6rem;color:var(--text2);">Style</label>
                            <select class="f-input-sm" id="notif-style">
                                <option value="motivational" ${settings.style === 'motivational' ? 'selected' : ''}>Motivational</option>
                                <option value="simple" ${settings.style === 'simple' ? 'selected' : ''}>Simple</option>
                                <option value="detailed" ${settings.style === 'detailed' ? 'selected' : ''}>Detailed AI analysis</option>
                            </select>
                        </div>
                    </div>
                    <div style="margin-top:0.3rem;">
                        <label class="f-label" style="font-size:0.6rem;color:var(--text2);">Goals to track</label>
                        ${goalChecks}
                    </div>
                    <div style="display:flex;gap:0.3rem;flex-wrap:wrap;margin-top:0.4rem;">
                        <button class="btn-fin btn-fin-o" onclick="updateNotifSettings()">💾 Save Settings</button>
                        ${perm !== 'granted' ? '<button class="btn-fin btn-fin-o" onclick="requestNotifPermission()">🔔 Enable Push</button>' : ''}
                        <button class="btn-fin btn-fin-o" onclick="testNotification()">🧪 Test Notification</button>
                    </div>
                `;
            }

            // ============================================================
            //  EXPORT
            // ============================================================
            window.exportData = async function() {
                const data = {
                    exportDate: new Date().toISOString(),
                    sessions: await dbAll('sessions'),
                    items: await dbAll('items'),
                    goals: await dbAll('goals'),
                    experiments: await dbAll('experiments'),
                    finance: await dbAll('finance'),
                };
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `logostics-${new Date().toISOString().split('T')[0]}.json`;
                a.click();
                URL.revokeObjectURL(url);
                alert('Exported!', 's');
            };

            function esc(str) { if (!str) return ''; const div = document.createElement('div');
                div.textContent = str; return div.innerHTML; }

            // ============================================================
            //  INIT
            // ============================================================
            async function init() {
                await openDB();
                $$('.nav-tab').forEach(tab => {
                    tab.addEventListener('click', () => switchTab(tab.dataset.tab));
                });
                $('#modal').addEventListener('click', (e) => { if (e.target === $('#modal')) hideModal(); });
                window.switchTab = switchTab;
                window.switchAnalytics = switchAnalytics;
                window.updateStats = updateStats;
                window.viewSession = viewSession;
                window.deleteSession = deleteSession;
                window.clearAllSessions = clearAllSessions;
                window.hideModal = hideModal;
                window.esc = esc;
                window.renderDashboard = renderDashboard;
                window.renderAnalytics = renderAnalytics;
                window.renderFinance = renderFinance;
                window.addGoal = addGoal;
                window.deleteGoal = deleteGoal;
                window.addExperiment = addExperiment;
                window.deleteExperiment = deleteExperiment;
                window.checkAndSendNotifications = checkAndSendNotifications;
                renderDashboard();
                // Initial theme
                setTimeout(() => updateTheme(), 1500);
            }

            init().catch(console.error);
        })();
    </script>
</body>
</html>
